              schema:
                $ref: "#/components/schemas/Ticket"
        "409":
          description: |
            Ticket state conflict. The ticket is no longer in
            `awaiting_acceptance` (`ticket_not_awaiting_acceptance`) or
            the compare-and-swap on the accept transition lost its race
            (`ticket_state_changed`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketStateConflictError"

