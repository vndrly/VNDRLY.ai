    # ── Vendor Merge ──
    VendorMergeRequestBody:
      type: object
      description: |
        Body for both `previewVendorMerge` and `mergeVendor`. The path
        parameter `id` identifies the loser (the row that disappears);
        `survivorVendorId` identifies the row that absorbs all FK rows.
      properties:
        survivorVendorId:
          type: integer
          description: Id of the vendor that will absorb all FK rows.
      required: [survivorVendorId]

    VendorMergeCount:
      type: object
      properties:
        move:
          type: integer
          description: Rows that will be re-pointed from loser to survivor.
        conflictDelete:
          type: integer
          description: Rows on the loser dropped because the survivor already holds the same unique-scope key.
      required: [move, conflictDelete]

    VendorMergePreviewResponse:
      type: object
      properties:
        survivorVendorId:
          type: integer
        survivorVendorName:
          type: string
        loserVendorId:
          type: integer
        loserVendorName:
          type: string
        counts:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/VendorMergeCount"
          description: Per-table counts. Keys are SQL table names (e.g. tickets, invoices).
        totalMoved:
          type: integer
        totalConflictDeleted:
          type: integer
      required: [survivorVendorId, survivorVendorName, loserVendorId, loserVendorName, counts, totalMoved, totalConflictDeleted]

    VendorMergeApplyResponse:
      type: object
      properties:
        survivorVendorId:
          type: integer
        survivorVendorName:
          type: string
        loserVendorId:
          type: integer
        loserVendorName:
          type: string
        counts:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/VendorMergeCount"
        totalMoved:
          type: integer
        totalConflictDeleted:
          type: integer
        auditLogId:
          type: integer
          description: Id of the row written to vendor_merge_audit_log.
      required: [survivorVendorId, survivorVendorName, loserVendorId, loserVendorName, counts, totalMoved, totalConflictDeleted, auditLogId]

    VendorMergeAuditLogSummary:
      type: object
      description: |
        One row from `vendor_merge_audit_log` as returned by the list
        endpoint. Mirrors the storage shape but omits the heavy
        `counts` map and `loserSnapshot` jsonb columns — those are
        only fetched on demand from the detail endpoint to keep the
        list response small even after years of merges accumulate.
      properties:
        id:
          type: integer
        survivorVendorId:
          type: ["integer", "null"]
          description: |
            FK to `vendors.id`. NULL only if the survivor vendor was
            itself later deleted (the FK is `ON DELETE SET NULL`).
        survivorVendorName:
          type: string
        loserVendorId:
          type: integer
          description: |
            Plain integer (no FK) — the loser row was deleted in the
            same transaction as the merge.
        loserVendorName:
          type: string
        totalMoved:
          type: integer
        totalConflictDeleted:
          type: integer
        actorUserId:
          type: ["integer", "null"]
        actorDisplayName:
          type: ["string", "null"]
          description: |
            Display name of the admin who initiated the merge,
            joined from `users.display_name` at read time. NULL if
            the user was deleted (FK is `ON DELETE SET NULL`).
        actorRole:
          type: string
        createdAt:
          type: string
          format: date-time
        revertedAt:
          type: ["string", "null"]
          format: date-time
          description: |
            When this merge was undone via the admin "Undo merge"
            action, or null if it has never been reverted. Used by the
            history page to render a "Reverted" badge and disable the
            Undo affordance.
        revertedByDisplayName:
          type: ["string", "null"]
          description: |
            Display name of the admin who clicked Undo, joined from
            `users.display_name`. NULL if the merge has not been
            reverted, or if the reverting admin has since been deleted.
      required:
        - id
        - survivorVendorName
        - loserVendorId
        - loserVendorName
        - totalMoved
        - totalConflictDeleted
        - actorRole
        - createdAt

    ListVendorMergeAuditLogResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/VendorMergeAuditLogSummary"
        total:
          type: integer
          description: |
            Total number of rows in `vendor_merge_audit_log`
            (independent of the current `limit` / `offset`). The
            admin UI uses this to render "showing N of M" and to
            decide whether a "Load more" affordance is needed.
        limit:
          type: integer
          description: The effective limit applied to this response.
        offset:
          type: integer
          description: The offset applied to this response.
      required: [items, total, limit, offset]

    VendorMergeAuditLogDetail:
      type: object
      description: |
        Full audit row for a single past merge — same as the summary
        plus the heavy `counts` and `loserSnapshot` jsonb columns and
        the captured request-context fields (IP / user agent).
      properties:
        id:
          type: integer
        survivorVendorId:
          type: ["integer", "null"]
        survivorVendorName:
          type: string
        loserVendorId:
          type: integer
        loserVendorName:
          type: string
        loserSnapshot:
          type: object
          additionalProperties: true
          description: |
            Verbatim copy of the loser `vendors` row at merge time
            (name, contact info, addresses, tax IDs, logoUrl, etc.).
            Stored as jsonb so older rows keep their shape across
            schema migrations.
        counts:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/VendorMergeCount"
          description: |
            Per-table counts. Keys are SQL table names (e.g.
            `tickets`, `invoices`); each value is the
            `{ move, conflictDelete }` pair the merge produced for
            that table.
        totalMoved:
          type: integer
        totalConflictDeleted:
          type: integer
        actorUserId:
          type: ["integer", "null"]
        actorDisplayName:
          type: ["string", "null"]
        actorRole:
          type: string
        actorIp:
          type: ["string", "null"]
        actorUserAgent:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        loserIdAvailable:
          type: boolean
          description: |
            True when the original loser vendor id is currently free
            and the merge can be reverted. False when another vendor
            row has since taken that numeric id (in which case
            `conflictingVendor` describes who).
        conflictingVendor:
          type: ["object", "null"]
          description: |
            The vendor currently occupying the loser's original id, or
            null when the id is free. The admin UI uses this to explain
            why "Revert this merge" is disabled.
          properties:
            id:
              type: integer
            name:
              type: string
          required: [id, name]
        revertedAt:
          type: ["string", "null"]
          format: date-time
          description: |
            When this merge was undone via the admin "Undo merge"
            action, or null if it has never been reverted.
        revertedByUserId:
          type: ["integer", "null"]
        revertedByDisplayName:
          type: ["string", "null"]
          description: |
            Display name of the admin who clicked Undo, joined from
            `users.display_name`. NULL if the merge has not been
            reverted, or if the reverting admin has since been deleted.
      required:
        - id
        - survivorVendorName
        - loserVendorId
        - loserVendorName
        - loserSnapshot
        - counts
        - totalMoved
        - totalConflictDeleted
        - actorRole
        - createdAt
        - loserIdAvailable
        - conflictingVendor

    VendorMergeConflictError:
      type: object
      properties:
        error:
          type: string
        code:
          type: string
          enum: [PARTIAL_CONFLICT]
        table:
          type: string
        description:
          type: string
        rows:
          type: array
          items:
            type: object
            additionalProperties: true
      required: [error, code, table, description, rows]

    RevertVendorMergeResponse:
      type: object
      description: |
        Result of restoring the loser vendor row from a merge audit-log
        snapshot. The restored vendor reuses the original numeric id so
        any external references that still mention it line up.
      properties:
        restoredVendorId:
          type: integer
          description: Id of the recreated vendor (equal to the original loser id).
        restoredVendorName:
          type: string
          description: Name of the recreated vendor (taken from the snapshot).
        auditLogId:
          type: integer
          description: Id of the vendor_merge_audit_log row that was reverted.
        revertedAt:
          type: string
          format: date-time
          description: |
            Timestamp at which the audit row was marked reverted. Persisted
            on the audit row so a second `revertVendorMerge` call against
            the same id short-circuits with `vendor_merge.already_reverted`.
      required: [restoredVendorId, restoredVendorName, auditLogId, revertedAt]

    RevertVendorMergeError:
      type: object
      description: |
        Generic error body returned by `revertVendorMerge` when the audit
        log row is missing or the snapshot itself is not restorable. The
        `code` namespace (`vendor_merge.*`) is stable and safe to branch
        on in the client.
      properties:
        error:
          type: string
        code:
          type: string
        issues:
          type: array
          description: |
            Optional Zod-style validation issues — present only when the
            snapshot failed schema validation (`vendor_merge.snapshot_unrecoverable`).
          items:
            type: object
            additionalProperties: true
      required: [error, code]

    RevertVendorMergeConflictError:
      type: object
      description: |
        Returned when the loser id (or its canonical name) is currently
        held by another vendor. Includes the conflicting vendor row so
        the admin can reach it from the response without a second lookup.
      properties:
        error:
          type: string
        code:
          type: string
          enum:
            - vendor_merge.loser_id_in_use
            - vendor_merge.name_in_use
            - vendor_merge.restore_conflict
            - vendor_merge.already_reverted
        revertedAt:
          type: string
          format: date-time
          description: |
            When the merge was previously reverted. Present only on the
            `vendor_merge.already_reverted` branch.
        revertedByDisplayName:
          type: ["string", "null"]
          description: |
            Display name of the admin who originally clicked Undo. NULL
            if that admin has since been deleted. Present only on
            `vendor_merge.already_reverted`.
        conflictingVendor:
          type: object
          description: |
            The vendor currently using the colliding id or name. Omitted
            for `vendor_merge.restore_conflict`, which only carries the
            failing constraint name.
          properties:
            id: { type: integer }
            name: { type: string }
          required: [id, name]
        constraint:
          type: string
          nullable: true
          description: |
            Name of the Postgres constraint that fired on
            `vendor_merge.restore_conflict`, or null when not available.
      required: [error, code]

    TicketStateConflictCode:
      type: string
      description: |
        Canonical "ticket state conflict" error codes returned on the JSON
        `error` field by the ticket mutation routes. Each value means the
        server's view of the ticket no longer matches the device's view
        (someone else accepted/denied/cancelled, the lifecycle moved on,
        a compare-and-swap lost a race, etc.). The recommended UX is to
        silently refresh the ticket and let the user decide what to do
        next, rather than pinning a stale inline error under a control
        that may have just disappeared.

        Per-code meaning:
          * `ticket_not_accepted` — caller tried to act on a ticket that
            has not yet cleared the accept gate (still in invite phase).
          * `ticket_not_awaiting_acceptance` — accept/deny was attempted
            on a ticket that is no longer in `awaiting_acceptance`
            (someone already responded).
          * `ticket_state_changed` — compare-and-swap on a status
            transition lost its race; the ticket moved between read and
            write.
          * `ticket_not_checkinable` — check-in was attempted on a
            ticket whose status no longer permits it.
          * `ticket_en_route_invalid_state` — en-route was attempted on
            a ticket whose lifecycle/status no longer permits it.

        Source of truth: the shared workspace lib
        `@workspace/ticket-state-conflict-codes`
        (`lib/ticket-state-conflict-codes/src/index.ts`), which the
        api-server route emit sites and the mobile + web clients all
        import from.
      enum:
        - ticket_not_accepted
        - ticket_not_awaiting_acceptance
        - ticket_state_changed
        - ticket_not_checkinable
        - ticket_en_route_invalid_state

    TicketStateConflictError:
      type: object
      description: |
        409 response body shared by the ticket accept, deny, check-in,
        en-route, and cancel endpoints. The canonical machine-readable
        contract is the snake_case `error` field; clients should branch
        on that value and refresh the ticket. The `message` field is a
        human-readable hint that may be surfaced to end users. Some
        endpoints additionally emit a legacy dot-notation `code` (e.g.
        `ticket.en_route_invalid_state`) for older clients; new clients
        should rely on `error`.
      properties:
        error:
          $ref: "#/components/schemas/TicketStateConflictCode"
        message:
          type: string
        code:
          type: string
          description: |
            Optional legacy dot-notation code (e.g.
            `ticket.en_route_invalid_state`). Present on some endpoints
            for backwards compatibility; prefer the `error` field.
      required: [error]

