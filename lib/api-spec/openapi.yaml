        checkInAt:
          type: string
          format: date-time
          nullable: true
        checkOutAt:
          type: string
          format: date-time
          nullable: true
        hourlyRateAtTime:
          type: number
          nullable: true
      required: [reason]

    LaborSummaryPerson:
      type: object
      properties:
        employeeId:
          type: integer
        employeeName:
          type: string
        rate:
          type: number
        regularHours:
          type: number
        overtimeHours:
          type: number
        totalHours:
          type: number
        regularCost:
          type: number
        overtimeCost:
          type: number
        totalCost:
          type: number
        sessions:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              employeeId:
                type: integer
              employeeName:
                type: string
              checkInAt:
                type: string
                format: date-time
              checkOutAt:
                type: string
                format: date-time
                nullable: true
              hours:
                type: number
              rate:
                type: number
              cost:
                type: number
              isOpen:
                type: boolean
              longSession:
                type: boolean
              source:
                type: string
            required: [id, employeeId, employeeName, checkInAt, hours, rate, cost, isOpen, longSession, source]
      required: [employeeId, employeeName, rate, regularHours, overtimeHours, totalHours, regularCost, overtimeCost, totalCost, sessions]

    LaborSummary:
      type: object
      properties:
        ticketId:
          type: integer
        dailyOtHours:
          type: number
        weeklyOtHours:
          type: number
        longSessionHours:
          type: number
        people:
          type: array
          items:
            $ref: "#/components/schemas/LaborSummaryPerson"
        totals:
          type: object
          properties:
            regularHours:
              type: number
            overtimeHours:
              type: number
            totalHours:
              type: number
            regularCost:
              type: number
            overtimeCost:
              type: number
            totalCost:
              type: number
          required: [regularHours, overtimeHours, totalHours, regularCost, overtimeCost, totalCost]
      required: [ticketId, dailyOtHours, weeklyOtHours, longSessionHours, people, totals]

    # ── Onboarding wizard schemas ──
