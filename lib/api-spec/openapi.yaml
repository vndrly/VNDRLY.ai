          type: boolean
        status:
          $ref: "#/components/schemas/SiteLocationStatus"
        partnerName:
          type: ["string", "null"]
        siteRadiusMeters:
          type: ["integer", "null"]
        afe:
          type: ["string", "null"]
        photoUrl:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required: [id, partnerId, name, address, latitude, longitude, siteCode, state, isActive, status, partnerName, siteRadiusMeters, afe, photoUrl, createdAt]

    SiteLocationDetail:
      type: object
      properties:
        id:
          type: integer
        partnerId:
          type: integer
        name:
          type: string
        address:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        siteCode:
          type: string
        state:
          type: ["string", "null"]
        isActive:
          type: boolean
        status:
          $ref: "#/components/schemas/SiteLocationStatus"
        partnerName:
          type: ["string", "null"]
        siteRadiusMeters:
          type: ["integer", "null"]
        afe:
          type: ["string", "null"]
        photoUrl:
          type: ["string", "null"]
        hidden:
          type: boolean
        supersededAt:
          type: ["string", "null"]
          format: date-time
        sourceType:
          type: string
        createdAt:
          type: string
          format: date-time
        assignments:
          type: array
          items:
            $ref: "#/components/schemas/SiteWorkAssignment"
      required: [id, partnerId, name, address, latitude, longitude, siteCode, state, isActive, status, partnerName, siteRadiusMeters, afe, photoUrl, hidden, supersededAt, sourceType, createdAt, assignments]

    CreateSiteLocationBody:
      type: object
      properties:
        partnerId:
          type: integer
        name:
          type: string
        address:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        state:
          type: ["string", "null"]
        siteRadiusMeters:
          type: ["integer", "null"]
        photoUrl:
          type: ["string", "null"]
        afe:
          type: ["string", "null"]
        autoAssignAllVendors:
          type: ["boolean", "null"]
          description: |
            When true, after the site row is created the server copies every
            (vendor_id, work_type_id) pair already approved on this partner
            (from `partner_vendor_work_type_approvals`) into
            `site_work_assignments` for the new site. Lets a partner stand
            up a site that is immediately visible on mobile to every
            already-approved vendor without manually re-assigning each one.
            Default false: site is created with zero assignments and the
            partner is expected to assign vendors from the site detail page.
      required: [partnerId, name, address, latitude, longitude]

    UpdateSiteLocationBody:
      type: object
      properties:
        name:
          type: string
        address:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        state:
          type: ["string", "null"]
        isActive:
          type: boolean
        status:
          $ref: "#/components/schemas/SiteLocationStatus"
        afe:
          type: ["string", "null"]
        hidden:
          type: boolean
          description: "Admin-only. Set to false to restore a hidden/superseded site (e.g. county-area anchor superseded by ingested wells); supersededAt is cleared automatically when hidden is set to false."
        siteRadiusMeters:
          type: ["integer", "null"]
          minimum: 1
          maximum: 10000
          description: "Geofence radius in meters used for vendor check-in. Null means use the default."
        photoUrl:
          type: ["string", "null"]
          description: "URL to a photo of the wellhead at this location, used for visual identification."

    QrCodeData:
      type: object
      properties:
        siteCode:
          type: string
        qrCodeUrl:
          type: string
        portalUrl:
          type: string
      required: [siteCode, qrCodeUrl, portalUrl]

    # ── Site Work Assignment ──
    SiteWorkAssignment:
      type: object
      properties:
        id:
          type: integer
        siteLocationId:
          type: integer
        workTypeId:
          type: integer
        vendorId:
          type: integer
        workTypeName:
          type: string
        workTypeCategory:
          type: string
        vendorName:
          type: string
        afe:
          type: ["string", "null"]
      required: [id, siteLocationId, workTypeId, vendorId, workTypeName, workTypeCategory, vendorName, afe]

    CreateSiteAssignmentBody:
      type: object
      properties:
        workTypeId:
          type: integer
        vendorId:
          type: integer
        afe:
          type: ["string", "null"]
      required: [workTypeId, vendorId]

    UpdateSiteAssignmentBody:
      type: object
      properties:
        afe:
          type: ["string", "null"]

    # ── Direct (Partner→Vendor) Work Assignment ──
    DirectAssignment:
      type: object
      description: |
        A time-bound direct work offer from a partner to a single
        vendor. Status flows pending → committed | passed | cancelled.
        Joined fields (`siteName`, `partnerName`, `vendorName`) are
        populated by the API for list/detail responses so clients can
        render rows without a follow-up lookup.
      properties:
        id:
          type: integer
        partnerId:
          type: integer
        siteLocationId:
          type: integer
        vendorId:
          type: integer
        siteName:
          type: string
        partnerName:
          type: string
        vendorName:
          type: string
        scopeOfWork:
          type: ["string", "null"]
        startDate:
          type: string
          description: ISO date (YYYY-MM-DD)
        endDate:
          type: string
          description: ISO date (YYYY-MM-DD)
        status:
          type: string
          enum: [pending, committed, passed, cancelled]
        passReason:
          type: ["string", "null"]
        respondedAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - partnerId
        - siteLocationId
        - vendorId
        - siteName
        - partnerName
        - vendorName
        - scopeOfWork
        - startDate
        - endDate
        - status
        - passReason
        - respondedAt
        - createdAt
        - updatedAt

    CreateDirectAssignmentBody:
      type: object
      properties:
        vendorId:
          type: integer
        startDate:
          type: string
          description: ISO date (YYYY-MM-DD)
        endDate:
          type: string
          description: ISO date (YYYY-MM-DD)
        scopeOfWork:
          type: ["string", "null"]
      required: [vendorId, startDate, endDate]

    RespondDirectAssignmentBody:
      type: object
      properties:
        reason:
          type: ["string", "null"]
          description: |
            Optional free-text reason a vendor provides when passing on
            an offer. Surfaced to the partner in the in-app + email
            notification so they know why the offer was declined.

    # ── Generic / shared error envelopes ──
    GenericApiError:
      type: object
      properties:
        error:
          type: string
        code:
          type: ["string", "null"]
      required: [error]

    WorkTypeNotInVendorCatalogError:
      type: object
      description: |
        Surfaced by site-assignment writes when the (vendor, workType)
        pair isn't on the vendor's catalog. The UI uses `vendorName` and
        `workTypeName` to populate the confirm dialog.
      properties:
        error:
          type: string
          enum: [work_type_not_in_vendor_catalog]
        code:
          type: string
          enum: [work_type_not_in_vendor_catalog]
        vendorId:
          type: integer
        workTypeId:
          type: integer
        vendorName:
          type: ["string", "null"]
        workTypeName:
          type: ["string", "null"]
      required: [error, code, vendorId, workTypeId, vendorName, workTypeName]

    # ── Vendor Work Type catalog (presence + pricing) ──
    VendorWorkTypeUnit:
      type: string
      enum: [per_hour, per_day, per_job, lump_sum]

    VendorWorkTypeCatalogItem:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: ["string", "null"]
        selected:
          type: boolean
        unitPrice:
          type: ["string", "null"]
          description: numeric(12,2) as a string, e.g. "125.00"
        unit:
          oneOf:
            - $ref: "#/components/schemas/VendorWorkTypeUnit"
            - type: "null"
        currency:
          type: ["string", "null"]
          description: ISO 4217 currency code (defaults USD)
        notes:
          type: ["string", "null"]
      required: [id, name, category, selected, unitPrice, unit, currency, notes]

    VendorWorkTypeCatalogResponse:
      type: object
      properties:
        vendorId:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/VendorWorkTypeCatalogItem"
      required: [vendorId, items]

    SetVendorWorkTypeCatalogItem:
      type: object
      properties:
        workTypeId:
          type: integer
        unitPrice:
          oneOf:
            - type: string
            - type: number
            - type: "null"
        unit:
          oneOf:
            - $ref: "#/components/schemas/VendorWorkTypeUnit"
            - type: "null"
        currency:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
      required: [workTypeId]

    SetVendorWorkTypeCatalogBody:
      type: object
      description: |
        Provide `items` for the preferred per-row pricing shape, or
        `workTypeIds` for the legacy presence-only shape. At least one
        of the two must be present.
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/SetVendorWorkTypeCatalogItem"
        workTypeIds:
          type: array
          items:
            type: integer

    SetVendorWorkTypeCatalogResponse:
      type: object
      properties:
        vendorId:
          type: integer
        added:
          type: integer
        removed:
          type: integer
        updated:
          type: integer
      required: [vendorId, added, removed, updated]

    # ── Vendor Work Type Site AFE listing (vendor portal catalog) ──
    VendorWorkTypeSiteAfeItem:
      type: object
      properties:
        assignmentId:
          type: integer
        siteLocationId:
          type: integer
        siteCode:
          type: string
        siteName:
          type: string
        partnerName:
          type: ["string", "null"]
        afe:
          type: ["string", "null"]
      required: [assignmentId, siteLocationId, siteCode, siteName, partnerName, afe]

    VendorWorkTypeSiteAfesResponse:
      type: object
      properties:
        vendorId:
          type: integer
        workTypeId:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/VendorWorkTypeSiteAfeItem"
      required: [vendorId, workTypeId, items]

    # Bulk variant — same item shape plus the workTypeId on each row so
    # the vendor portal catalog can render inline AFE pills per row in
    # one request.
    VendorSiteAfeItem:
      type: object
      properties:
        workTypeId:
          type: integer
        assignmentId:
          type: integer
        siteLocationId:
          type: integer
        siteCode:
          type: string
        siteName:
          type: string
        partnerName:
          type: ["string", "null"]
        afe:
          type: ["string", "null"]
      required:
        [workTypeId, assignmentId, siteLocationId, siteCode, siteName, partnerName, afe]

    VendorSiteAfesResponse:
      type: object
      properties:
        vendorId:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/VendorSiteAfeItem"
      required: [vendorId, items]

    # ── Field Employee ──
    FieldEmployee:
      type: object
      properties:
        id:
          type: integer
        vendorId:
          type: integer
        vendorRole:
          type: ["string", "null"]
        jobTitle:
          type: ["string", "null"]
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        userId:
          type: ["integer", "null"]
        vendorName:
          type: ["string", "null"]
        vendorLogoUrl:
          type: ["string", "null"]
        isActive:
          type: boolean
        pecCertification:
          type: boolean
        pecExpirationDate:
          type: ["string", "null"]
        photoUrl:
          type: ["string", "null"]
        profilePhotoPath:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        deletedAt:
          type: ["string", "null"]
          format: date-time
        deletedBy:
          type: ["string", "null"]
        suspendedAt:
          type: ["string", "null"]
          format: date-time
          description: When set, this user is suspended and cannot log in.
        hasLogin:
          type: boolean
          description: True when this employee has a linked login account.
        mustChangePassword:
          type: boolean
          description: True when an admin set a temporary password and the user must change it on next login.
        preferredLanguage:
          type: ["string", "null"]
          enum: [en, es, null]
          description: |
            Preferred UI/assistant language for this field employee. Mirrors the
            `vendor_people.preferred_language` column the token-mode onboarding
            assistant reads, and is kept in sync with `users.preferred_language`
            for the linked login (when one exists). `null` means "let the
            user/device decide".
      required: [id, vendorId, firstName, lastName, email, phone, vendorName, isActive, pecCertification, pecExpirationDate, createdAt]

    # ── Vendor / Partner Contacts ──
    # `vendor_contacts` and `vendor_people` (the source for FieldEmployee)
    # are the same underlying table — VendorContact only surfaces the
    # office-role subset returned by `/vendors/{vendorId}/contacts`.
    # Field shapes intentionally mirror the historical wire types the
    # web client was already consuming so adding the OpenAPI doc is a
    # pure-additive change for existing call sites.
    VendorContact:
      type: object
      properties:
        id:
          type: integer
        vendorId:
          type: integer
        vendorRole:
          type: string
          description: "Office role (e.g. `office`, `accounts_payable`). Field/foreman rows are excluded from this collection."
        roles:
          type: array
          items: { type: string }
        jobTitle:
          type: ["string", "null"]
          description: Underlying `vendor_people.job_title` column is nullable, so callers must guard against `null`.
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        isActive:
          type: boolean
        pecCertification:
          type: boolean
        pecExpirationDate:
          type: ["string", "null"]
        photoUrl:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        deletedAt:
          type: ["string", "null"]
          format: date-time
          description: When set, the contact has been soft-deleted and is hidden unless `includeDeleted=true` is passed (admin only).
        deletedBy:
          type: ["string", "null"]
          description: "`role:userId` audit string identifying who soft-deleted this contact."
      required: [id, vendorId, vendorRole, jobTitle, firstName, lastName, email, phone, isActive, createdAt]

    PartnerContact:
      type: object
      properties:
        id:
          type: integer
        partnerId:
          type: integer
        jobTitle:
          type: string
        name:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        roles:
          type: array
          items: { type: string }
        photoUrl:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        deletedAt:
          type: ["string", "null"]
          format: date-time
          description: When set, the contact has been soft-deleted and is hidden unless `includeDeleted=true` is passed (admin only).
        deletedBy:
          type: ["string", "null"]
          description: "`role:userId` audit string identifying who soft-deleted this contact."
      required: [id, partnerId, jobTitle, name, email, phone, roles, createdAt]

    CreateFieldEmployeeBody:
      type: object
      properties:
        vendorId:
          type: integer
        vendorRole:
          type: string
        jobTitle:
          type: ["string", "null"]
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        pecCertification:
          type: boolean
        pecExpirationDate:
          type: ["string", "null"]
        roles:
          type: array
          items: { type: string }
      required: [vendorId, firstName, lastName, email]

    # ── Field employee login credential schemas ──
    # `preferredLanguage` mirrors the `users.preferred_language` column
    # the field-mobile UI reads on first sign-in. Only "en" and "es" are
    # supported today; `null` means "let the device/browser decide".
    FieldEmployeeLoginStatus:
      type: object
      description: Whether the field employee has a linked login user, and that user's email/id when present.
      properties:
        hasLogin:
          type: boolean
        email:
          type: string
        userId:
          type: integer
      required: [hasLogin]

    SetFieldEmployeeLoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
          minLength: 8
        displayName:
          type: string
          description: Optional override; defaults to the employee's "First Last" name (or the email if unnamed).
        preferredLanguage:
          type: string
          enum: [en, es]
          nullable: true
          description: Default UI language for the linked login. Omit to leave any existing preference unchanged.
      required: [email, password]

    SetFieldEmployeeLoginResponse:
      type: object
      properties:
        employeeId: { type: integer }
        userId: { type: integer }
        email: { type: string }
        status:
          type: string
          enum: [created, updated]
        preferredLanguage:
          type: string
          enum: [en, es]
          nullable: true
      required: [employeeId, userId, email, status, preferredLanguage]

    BulkFieldEmployeeLoginRow:
      type: object
      properties:
        employeeId: { type: integer }
        email: { type: string }
        password:
          type: string
          minLength: 8
        displayName: { type: string }
        preferredLanguage:
          type: string
          enum: [en, es]
          nullable: true
        language:
          type: string
          enum: [en, es]
          nullable: true
          description: Legacy alias for `preferredLanguage`. Used when `preferredLanguage` is not provided.
      required: [employeeId, email, password]

    BulkFieldEmployeeLoginBody:
      type: object
      properties:
        rows:
          type: array
          maxItems: 500
          items:
            $ref: "#/components/schemas/BulkFieldEmployeeLoginRow"
      required: [rows]

    BulkFieldEmployeeLoginResultItem:
      type: object
      description: |
        Per-row outcome. On success, `status` is `created` or `updated` and
        `userId`/`email`/`preferredLanguage` are populated. On failure,
        `status` is `error` and `message` describes why.
      properties:
        index: { type: integer }
        employeeId: { type: integer }
        userId: { type: integer }
        email: { type: string }
        status:
          type: string
          enum: [created, updated, error]
        message: { type: string }
        preferredLanguage:
          type: string
          enum: [en, es]
          nullable: true
      required: [index, status]

    BulkFieldEmployeeLoginResponse:
      type: object
      properties:
        created: { type: integer }
        updated: { type: integer }
        errors: { type: integer }
        results:
          type: array
          items:
            $ref: "#/components/schemas/BulkFieldEmployeeLoginResultItem"
      required: [created, updated, errors, results]

    EmployeeCertification:
      type: object
      properties:
        id: { type: integer }
        employeeId: { type: integer }
        name: { type: string }
        issuer: { type: ["string", "null"] }
        certNumber: { type: ["string", "null"] }
        issuedDate: { type: ["string", "null"] }
        expirationDate: { type: ["string", "null"] }
        documentUrl: { type: ["string", "null"] }
        documentPath: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        deletedAt: { type: ["string", "null"], format: date-time }
        deletedBy: { type: ["string", "null"] }
      required: [id, employeeId, name, issuer, certNumber, issuedDate, expirationDate, documentUrl, documentPath, createdAt]

    CreateEmployeeCertificationBody:
      type: object
      properties:
        name: { type: string }
        issuer: { type: ["string", "null"] }
        certNumber: { type: ["string", "null"] }
        issuedDate: { type: ["string", "null"] }
        expirationDate: { type: ["string", "null"] }
        documentUrl: { type: ["string", "null"] }
        documentPath: { type: ["string", "null"] }
      required: [name]

    UpdateEmployeeCertificationBody:
      type: object
      properties:
        name: { type: string }
        issuer: { type: ["string", "null"] }
        certNumber: { type: ["string", "null"] }
        issuedDate: { type: ["string", "null"] }
        expirationDate: { type: ["string", "null"] }
        documentUrl: { type: ["string", "null"] }
        documentPath: { type: ["string", "null"] }

    ComplianceCertSummary:
      type: object
      properties:
        name: { type: string }
        issuer: { type: ["string", "null"] }
        expirationDate: { type: ["string", "null"] }
        status: { type: string, enum: [valid, expiring, expired, no_expiration] }
      required: [name, issuer, expirationDate, status]

    ComplianceVerifyResponse:
      type: object
      properties:
        verified: { type: boolean }
        employeeId: { type: integer }
        firstName: { type: string }
        lastName: { type: string }
        photoUrl: { type: ["string", "null"] }
        employerName: { type: ["string", "null"] }
        jobTitle: { type: ["string", "null"] }
        active: { type: boolean }
        certifications:
          type: array
          items:
            $ref: "#/components/schemas/ComplianceCertSummary"
        verifiedAt: { type: string, format: date-time }
      required: [verified, employeeId, firstName, lastName, photoUrl, employerName, jobTitle, active, certifications, verifiedAt]

    # ── Portal ──
    PortalInfo:
      type: object
      properties:
        siteLocation:
          $ref: "#/components/schemas/SiteLocation"
        availableWorkTypes:
          type: array
          items:
            $ref: "#/components/schemas/SiteWorkAssignment"
        # Brand assets/colors for the partner that owns this site, surfaced
        # so the QR-code portal can paint partner-branded chrome (header
        # accents, primary buttons, etc.) without requiring the field
        # employee's own auth org to match the site's partner. Null when
        # the site has no partner or the partner has no brand assets yet —
        # callers fall back to the VNDRLY default in that case.
        partnerBrand:
          oneOf:
            - type: "null"
            - $ref: "#/components/schemas/PartnerBrand"
      required: [siteLocation, availableWorkTypes, partnerBrand]

    PartnerBrand:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        logoUrl:
          type: ["string", "null"]
        logoSquareUrl:
          type: ["string", "null"]
        brandPrimaryColor:
          type: ["string", "null"]
        brandAccentColor:
          type: ["string", "null"]
      required: [id, name, logoUrl, logoSquareUrl, brandPrimaryColor, brandAccentColor]

    # ── Ticket ──
    TicketStatus:
      type: string
      description: |
        Canonical lifecycle state of a ticket. Single source of truth
        for the office web app's ticket-status badge / action-pill
        (`artifacts/vndrly/src/components/ticket-status-badge.tsx`,
        which derives its color buckets and labels from this enum
        via `@workspace/ticket-status-meta`) and the field mobile
        app's status pill
        (`artifacts/vndrly-mobile/lib/ticketStatusLabels.ts`). Adding
        a new status here automatically forces a meta entry on both
        platforms via the typed `Record<TicketStatus, …>` map in the
        shared lib; missing entries surface as a typecheck error so
        the UI cannot silently fall back to a raw snake_case string.
      enum:
        - draft
        - initiated
        - in_progress
        - pending_review
        - completed
        - submitted
        - approved
        - kicked_back
        - cancelled
        - awaiting_acceptance
        - denied
        - awaiting_payment
        - funds_dispersed

    Ticket:
      type: object
      properties:
        id:
          type: integer
        siteLocationId:
          type: integer
        vendorId:
          type: integer
        fieldEmployeeId:
          type: ["integer", "null"]
        workTypeId:
          type: integer
        status:
          $ref: "#/components/schemas/TicketStatus"
        description:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        kickbackReason:
          type: ["string", "null"]
        checkInTime:
          type: ["string", "null"]
          format: date-time
        checkOutTime:
          type: ["string", "null"]
          format: date-time
        checkInLatitude:
          type: ["number", "null"]
        checkInLongitude:
          type: ["number", "null"]
        checkOutLatitude:
          type: ["number", "null"]
        checkOutLongitude:
          type: ["number", "null"]
        siteName:
          type: ["string", "null"]
        vendorName:
          type: ["string", "null"]
        workTypeName:
          type: ["string", "null"]
        fieldEmployeeName:
