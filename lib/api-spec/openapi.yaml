openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: VNDRLY Field Operations API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: partners
    description: Partner account management
  - name: siteLocations
    description: Site location management
  - name: vendors
    description: Vendor management
  - name: fieldEmployees
    description: Field employee management
  - name: tickets
    description: Ticket workflow
  - name: workTypes
    description: Work type catalog
  - name: dashboard
    description: Dashboard and summary endpoints
  - name: field
    description: |
      Mobile field-employee self-service endpoints (the `/field/*`
      family backing the field-mobile app). All endpoints require a
      field-employee session cookie and operate on the calling
      employee's own data (no `:employeeId` parameter — the server
      resolves the employee from the session).
  - name: orgMembers
    description: |
      Admin endpoints for managing the user logins attached to a
      Partner or Vendor org via `user_org_memberships`. Field-employee
      memberships are intentionally excluded — they are managed via
      the field-employee tools which own their own membership sync.
  - name: platform
    description: |
      VNDRLY platform-level configuration: the singleton
      platform_settings row (company info / branding for the
      VNDRLY admin org itself) and the list of system administrators.
      All write endpoints require role=admin.
  - name: reports
    description: |
      Reports tab endpoints. The vast majority of this surface is
      still served by hand-written Express handlers in
      `artifacts/api-server/src/routes/reports.ts` — only the few
      operations whose response shape is consumed by the admin UI
      and is too rich to keep in sync via inline comments are
      described here so the front-end client gets generated types
      and React Query hooks.
  - name: storage
    description: |
      Object-storage helpers used by every photo / file uploader in
      the web and mobile clients. The two-step flow is:
      `POST /storage/uploads/request-url` returns a presigned PUT
      URL plus the canonical `objectPath`; the client PUTs the file
      bytes directly to the upload URL; then
      `POST /storage/uploads/finalize` stamps the ACL so the new
      object is readable through `GET /storage/objects/*`.

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Partners ──
  /partners/match:
    get:
      operationId: matchPartner
      tags: [partners]
      summary: Fuzzy-match a candidate partner name against existing partners
      description: |
        Returns the closest existing partners for the given `name`, sorted
        by similarity score descending. Used by the new-partner form to
        warn admins before they create a near-duplicate (e.g. typing
        "ConocoPhillips Permian" when "ConocoPhillips" already exists).
        Shares its normalization rules with `/vendors/match`. Admin-only.
      parameters:
        - name: name
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Closest existing-partner matches.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchPartnerResponse"

  /partners/check-name:
    get:
      operationId: checkPartnerName
      tags: [partners]
      summary: Public name-only fuzzy match for partner self-signup
      description: |
        Public counterpart of `matchPartner` for the unauthenticated
        partner self-signup flow on the web (signup-partner.tsx).
        Returns the *names* of the closest existing partners (no IDs
        or other PII) so the signup form can warn a partner that their
        company already has an account before they create a duplicate.
        Mirrors `/vendors/check-name`. No auth required.
      parameters:
        - name: name
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Closest existing-partner name matches.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckPartnerNameResponse"

  /partners:
    get:
      operationId: listPartners
      tags: [partners]
      summary: List all partners
      responses:
        "200":
          description: List of partners
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Partner"
    post:
      operationId: createPartner
      tags: [partners]
      summary: Create a new partner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePartnerBody"
      responses:
        "201":
          description: Partner created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Partner"

  /partners/{id}:
    get:
      operationId: getPartner
      tags: [partners]
      summary: Get partner by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Partner details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Partner"
    patch:
      operationId: updatePartner
      tags: [partners]
      summary: Update a partner
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePartnerBody"
      responses:
        "200":
          description: Partner updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Partner"

  # ── Partner Contacts ──
  /partners/{partnerId}/contacts:
    get:
      operationId: listPartnerContacts
      tags: [partners]
      summary: List a partner's contacts
      description: |
        Returns the partner's contacts. Visible to admins, the owning
        partner, and vendors with an active relationship to the partner.
      parameters:
        - name: partnerId
          in: path
          required: true
          schema:
            type: integer
        - name: includeDeleted
          in: query
          required: false
          description: Admin only — include soft-deleted contacts in the result.
          schema:
            type: boolean
      responses:
        "200":
          description: List of partner contacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PartnerContact"

  /partners/{partnerId}/contacts/{contactId}/restore:
    post:
      operationId: restorePartnerContact
      tags: [partners]
      summary: Restore a soft-deleted partner contact (admin only)
      description: Clears `deletedAt`/`deletedBy` so the contact reappears in the default (non-`includeDeleted`) listing.
      parameters:
        - name: partnerId
          in: path
          required: true
          schema:
            type: integer
        - name: contactId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Partner contact restored
        "401":
          description: Admin login required
        "404":
          description: Partner contact not found

  # ── Vendors ──
  /vendors:
    get:
      operationId: listVendors
      tags: [vendors]
      summary: List all vendors
      responses:
        "200":
          description: List of vendors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vendor"
    post:
      operationId: createVendor
      tags: [vendors]
      summary: Create a new vendor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVendorBody"
      responses:
        "201":
          description: Vendor created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"

  /vendors/match:
    get:
      operationId: matchVendor
      tags: [vendors]
      summary: Fuzzy-match a candidate vendor name against existing vendors
      description: |
        Returns the closest existing vendors for the given `name`, sorted
        by similarity score descending. Used by the new-vendor form to
        warn admins before they create a near-duplicate (e.g. typing
        "Baker Hughes Field Svcs" when "Baker Hughes" already exists).
        Admin-only.
      parameters:
        - name: name
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Closest existing-vendor matches.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchVendorResponse"

  /vendors/check-name:
    get:
      operationId: checkVendorName
      tags: [vendors]
      summary: Public name-only fuzzy match for vendor self-signup
      description: |
        Public counterpart of `matchVendor` for the unauthenticated
        vendor self-signup flow on field-mobile. Returns the *names*
        of the closest existing vendors (no IDs or other PII) so the
        signup form can warn a vendor that their company already has
        an account before they create a duplicate. No auth required.
      parameters:
        - name: name
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Closest existing-vendor name matches.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckVendorNameResponse"

  /vendors/{id}:
    get:
      operationId: getVendor
      tags: [vendors]
      summary: Get vendor by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Vendor details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"
    patch:
      operationId: updateVendor
      tags: [vendors]
      summary: Update a vendor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVendorBody"
      responses:
        "200":
          description: Vendor updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"

  /admin/vendor-merges:
    get:
      operationId: listVendorMergeAuditLog
      tags: [vendors]
      summary: List recent vendor merges (admin only)
      description: |
        Admin-only history of every `mergeVendor` apply that succeeded.
        Each row is what was written to `vendor_merge_audit_log` at
        merge time: survivor + loser names/ids, who initiated the
        merge, when, total rows moved, and total rows dropped because
        the survivor already held the same unique-scope key.

        Per-table counts and the loser snapshot are summarized only on
        this list view (`totalMoved`, `totalConflictDeleted`); fetch
        `/admin/vendor-merges/{id}` for the full per-table breakdown
        plus the captured loser row.

        Ordered newest first. Capped at `limit` rows (default 50,
        max 200) so the page can be paged with `offset`.
      parameters:
        - name: limit
          in: query
          required: false
          description: Max rows to return. Default 50, capped at 200.
          schema:
            type: integer
            minimum: 1
            maximum: 200
        - name: offset
          in: query
          required: false
          description: Skip this many rows before returning. Default 0.
          schema:
            type: integer
            minimum: 0
        - name: q
          in: query
          required: false
          description: |
            Case-insensitive substring match against the survivor or
            loser vendor name. Whitespace-only values are ignored.
          schema:
            type: string
        - name: actorUserId
          in: query
          required: false
          description: |
            Restrict the result to merges initiated by this admin user
            id. Useful for "show only the merges Joe ran".
          schema:
            type: integer
            minimum: 1
        - name: createdFrom
          in: query
          required: false
          description: |
            Inclusive lower bound on `createdAt` (ISO 8601 timestamp).
            Rows with `createdAt < createdFrom` are excluded.
          schema:
            type: string
            format: date-time
        - name: createdTo
          in: query
          required: false
          description: |
            Inclusive upper bound on `createdAt` (ISO 8601 timestamp).
            Rows with `createdAt > createdTo` are excluded.
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Paged list of merge audit rows (newest first)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListVendorMergeAuditLogResponse"
        "403":
          description: Admin role required

  /admin/vendor-merges/{id}:
    get:
      operationId: getVendorMergeAuditLog
      tags: [vendors]
      summary: Get one vendor-merge audit row (admin only)
      description: |
        Admin-only. Returns the full audit row for a single past
        merge, including the per-table `counts` map (one entry per
        FK table the merge touched, each with `move` /
        `conflictDelete`) and the captured `loserSnapshot` (the
        deleted vendor's name, contact info, tax IDs, addresses, etc.
        as they stood at merge time). Used by the admin "Vendor
        merge history" detail view.
      parameters:
        - name: id
          in: path
          required: true
          description: Audit log row id (the `auditLogId` returned from `mergeVendor`).
          schema:
            type: integer
      responses:
        "200":
          description: Full audit row for one past merge
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorMergeAuditLogDetail"
        "403":
          description: Admin role required
        "404":
          description: No such audit log row

  /vendors/{id}/merge-preview:
    post:
      operationId: previewVendorMerge
      tags: [vendors]
      summary: Preview a vendor merge (admin only)
      description: |
        Pre-flight check before an admin merges this vendor into a survivor.
        Returns per-table counts of rows that would move and rows that would
        be conflict-deleted (because the survivor already holds the same
        unique-scope key). Read-only — no data is modified. Returns 409 if a
        partial-index conflict (e.g. two draft invoices for the same period)
        would block the merge.
      parameters:
        - name: id
          in: path
          required: true
          description: Loser vendor id (the one to be deleted).
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VendorMergeRequestBody"
      responses:
        "200":
          description: Per-table preview of the merge
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorMergePreviewResponse"
        "409":
          description: Partial-index conflict would block the merge
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorMergeConflictError"

  /vendors/{id}/merge-into:
    post:
      operationId: mergeVendor
      tags: [vendors]
      summary: Merge this vendor into another vendor (admin only)
      description: |
        Re-points every vendor-scoped FK row from this vendor onto the
        chosen survivor inside a single transaction, then deletes this
        vendor. Records one audit-log row capturing who merged, when, the
        per-table counts, and a snapshot of the deleted vendor. Returns
        409 if a partial-index conflict would block the merge.
      parameters:
        - name: id
          in: path
          required: true
          description: Loser vendor id (the one to be deleted).
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VendorMergeRequestBody"
      responses:
        "200":
          description: Merge applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorMergeApplyResponse"
        "409":
          description: Partial-index conflict aborted the merge
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorMergeConflictError"

  /admin/vendor-merges/{id}/revert:
    post:
      operationId: revertVendorMerge
      tags: [vendors]
      summary: Revert a recent vendor merge by restoring the loser vendor row (admin only)
      description: |
        First-cut undo for the case "we picked the wrong survivor — please
        recreate the loser vendor so we can re-attach things by hand". The
        FK rows that were re-pointed during the merge are NOT moved back
        (the audit log doesn't track which rows were rewritten), but the
        deleted loser vendor row itself is restored from
        `vendor_merge_audit_log.loser_snapshot`, reusing the original
        numeric id so any external references that still mention it line
        up. Returns 409 if a vendor with that id (or with the same
        canonical name) is already in use.
      parameters:
        - name: id
          in: path
          required: true
          description: Audit log row id of the merge to revert.
          schema:
            type: integer
      responses:
        "200":
          description: Loser vendor row was restored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevertVendorMergeResponse"
        "404":
          description: Audit log row not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevertVendorMergeError"
        "409":
          description: |
            Either the merge has already been reverted
            (`vendor_merge.already_reverted`), or the loser id / canonical
            name is currently held by another vendor.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevertVendorMergeConflictError"
        "422":
          description: Snapshot is missing required fields and cannot be restored automatically
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevertVendorMergeError"

  /vendors/{vendorId}/work-types:
    get:
      operationId: listVendorWorkTypeCatalog
      tags: [vendors]
      summary: List the full work-type catalog with this vendor's selections + pricing
      description: |
        Returns every work type defined in the system, each annotated with
        whether this vendor has selected it and the per-row pricing fields
        the vendor has set. Powers the vendor self-service catalog page
        and the per-vendor "Services & Pricing" section in vendor-detail.
      parameters:
        - name: vendorId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Catalog with vendor selections + pricing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorWorkTypeCatalogResponse"
    put:
      operationId: setVendorWorkTypeCatalog
      tags: [vendors]
      summary: Replace the vendor's work-type catalog (with optional pricing)
      description: |
        Replace-all semantics. Accepts either the legacy `workTypeIds`
        array (presence only) or the preferred `items` array carrying
        per-row `unitPrice` (numeric(12,2) string), `unit` (per_hour /
        per_day / per_job / lump_sum), `currency` (ISO 4217, defaults
        USD), and `notes`. Vendor-org admins or VNDRLY system admins
        only.
      parameters:
        - name: vendorId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetVendorWorkTypeCatalogBody"
      responses:
        "200":
          description: Diff applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetVendorWorkTypeCatalogResponse"

  /vendors/{vendorId}/work-types/{workTypeId}/site-afes:
    get:
      operationId: getVendorWorkTypeSiteAfes
      tags: [vendors]
      summary: List a vendor's per-site AFE assignments for a specific work type
      description: |
        Returns the site assignments for the given vendor + work type, each
        with the AFE recorded on `site_work_assignments.afe`. Used by the
        vendor portal Product/Service catalog to show AFE pills.
      parameters:
        - name: vendorId
          in: path
          required: true
          schema:
            type: integer
        - name: workTypeId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Per-site AFE listing for this vendor + work type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorWorkTypeSiteAfesResponse"

  /vendors/{vendorId}/site-afes:
    get:
      operationId: getVendorSiteAfes
      tags: [vendors]
      summary: Bulk list a vendor's per-site AFE assignments across all work types
      description: |
        Returns every (work_type_id, site_assignment) pair for this vendor in
        a single payload. Used by the vendor portal Product/Service catalog to
        render inline AFE pills on each row without firing an N+1 number of
        per-work-type requests.
      parameters:
        - name: vendorId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bulk per-site AFE listing for this vendor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorSiteAfesResponse"

  # ── Vendor Contacts (office roles only; field/foreman live under /field-employees) ──
  /vendors/{vendorId}/contacts:
    get:
      operationId: listVendorContacts
      tags: [vendors]
      summary: List a vendor's office contacts
      description: |
        Returns the vendor's non-field office contacts. Field/foreman rows
        live in the `/field-employees` collection and are filtered out
        here. Visible to admins, the owning vendor, and partners with an
        active relationship to the vendor.
      parameters:
        - name: vendorId
          in: path
          required: true
          schema:
            type: integer
        - name: includeDeleted
          in: query
          required: false
          description: Admin only — include soft-deleted contacts in the result.
          schema:
            type: boolean
      responses:
        "200":
          description: List of vendor contacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VendorContact"

  /vendors/{vendorId}/contacts/{contactId}/restore:
    post:
      operationId: restoreVendorContact
      tags: [vendors]
      summary: Restore a soft-deleted vendor contact (admin only)
      description: |
        Clears `deletedAt`/`deletedBy` and re-activates the contact
        (`isActive=true`). Field/foreman rows are excluded — restore
        those through `/field-employees/{id}/restore` instead.
      parameters:
        - name: vendorId
          in: path
          required: true
          schema:
            type: integer
        - name: contactId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Vendor contact restored
        "401":
          description: Admin login required
        "404":
          description: Vendor contact not found

  # ── Work Types ──
  /work-types:
    get:
      operationId: listWorkTypes
      tags: [workTypes]
      summary: List all available work types
      responses:
        "200":
          description: List of work types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkType"

  # ── Site Locations ──
  /site-locations:
    get:
      operationId: listSiteLocations
      tags: [siteLocations]
      summary: List all site locations
      parameters:
        - name: partnerId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of site locations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SiteLocation"
    post:
      operationId: createSiteLocation
      tags: [siteLocations]
      summary: Create a new site location
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSiteLocationBody"
      responses:
        "201":
          description: Site location created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteLocation"

  /site-locations/{id}:
    get:
      operationId: getSiteLocation
      tags: [siteLocations]
      summary: Get site location by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Site location details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteLocationDetail"
    patch:
      operationId: updateSiteLocation
      tags: [siteLocations]
      summary: Update a site location
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSiteLocationBody"
      responses:
        "200":
          description: Site location updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteLocation"

  /site-locations/{id}/qr-code:
    get:
      operationId: getSiteLocationQrCode
      tags: [siteLocations]
      summary: Get QR code for a site location
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: QR code data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QrCodeData"

  # ── Site Work Assignments (work types + vendor per site) ──
  /site-locations/{siteId}/assignments:
    get:
      operationId: listSiteAssignments
      tags: [siteLocations]
      summary: List work type assignments for a site
      parameters:
        - name: siteId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of work assignments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SiteWorkAssignment"
    post:
      operationId: createSiteAssignment
      tags: [siteLocations]
      summary: Assign work type and vendor to a site
      parameters:
        - name: siteId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSiteAssignmentBody"
      responses:
        "201":
          description: Assignment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteWorkAssignment"
        "400":
          description: |
            Validation failure. When the body is structurally fine but the
            (vendor, workType) pair isn't on the vendor's catalog, the
            response carries `code: "work_type_not_in_vendor_catalog"` so
            the UI can prompt to add it.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/WorkTypeNotInVendorCatalogError"
                  - $ref: "#/components/schemas/GenericApiError"

  /site-locations/{siteId}/assignments/{assignmentId}:
    patch:
      operationId: updateSiteAssignment
      tags: [siteLocations]
      summary: Update a work assignment (e.g. AFE)
      parameters:
        - name: siteId
          in: path
          required: true
          schema:
            type: integer
        - name: assignmentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSiteAssignmentBody"
      responses:
        "200":
          description: Assignment updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteWorkAssignment"
    delete:
      operationId: deleteSiteAssignment
      tags: [siteLocations]
      summary: Remove a work assignment from a site
      parameters:
        - name: siteId
          in: path
          required: true
          schema:
            type: integer
        - name: assignmentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Assignment removed

  # ── Direct (Partner→Vendor) Work Assignments ──
  #
  # The "direct assignment" flow is a lightweight, time-bound work offer
  # from a partner straight to a single vendor — distinct from the static
  # `site_work_assignments` (work-type/AFE catalog) and from the full
  # ticket workflow. The partner picks a vendor + start/end dates +
  # scope-of-work, the vendor receives an in-app + email notification
  # and chooses Commit (accept the job) or Pass (decline; partner is
  # then nudged to find another vendor). Cancel is partner-only and
  # only valid while the offer is still pending.
  /site-locations/{siteId}/direct-assignments:
    get:
      operationId: listSiteDirectAssignments
      tags: [siteLocations]
      summary: List direct assignments offered for a site (partner view)
      parameters:
        - name: siteId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of direct assignments for this site
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DirectAssignment"
    post:
      operationId: createSiteDirectAssignment
      tags: [siteLocations]
      summary: Offer a direct work assignment to a vendor for this site
      parameters:
        - name: siteId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDirectAssignmentBody"
      responses:
        "201":
          description: Assignment offer created and vendor notified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DirectAssignment"
        "400":
          description: Validation failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericApiError"
        "403":
          description: Caller cannot offer assignments for this site
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericApiError"

  /direct-assignments:
    get:
      operationId: listDirectAssignments
      tags: [siteLocations]
      summary: |
        List direct assignments visible to the caller. Partner role
        sees offers their org made; vendor role sees offers made TO
        their org. Optional `status` filter for the vendor inbox view.
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, committed, passed, cancelled]
      responses:
        "200":
          description: List of direct assignments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DirectAssignment"

  /direct-assignments/{id}/commit:
    post:
      operationId: commitDirectAssignment
      tags: [siteLocations]
      summary: Vendor accepts a pending direct assignment offer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Assignment marked committed; partner notified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DirectAssignment"
        "409":
          description: Assignment is not in `pending` state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericApiError"

  /direct-assignments/{id}/pass:
    post:
      operationId: passDirectAssignment
      tags: [siteLocations]
      summary: Vendor declines a pending direct assignment offer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RespondDirectAssignmentBody"
      responses:
        "200":
          description: Assignment marked passed; partner notified to re-assign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DirectAssignment"
        "409":
          description: Assignment is not in `pending` state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericApiError"

  /direct-assignments/{id}/cancel:
    post:
      operationId: cancelDirectAssignment
      tags: [siteLocations]
      summary: Partner cancels a pending direct assignment offer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Assignment marked cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DirectAssignment"
        "409":
          description: Assignment is not in `pending` state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericApiError"

  # ── Field Employees ──
  /field-employees:
    get:
      operationId: listFieldEmployees
      tags: [fieldEmployees]
      summary: List field employees
      parameters:
        - name: vendorId
          in: query
          required: false
          schema:
            type: integer
        - name: includeDeleted
          in: query
          required: false
          description: Admin only — include soft-deleted employees in the result.
          schema:
            type: boolean
        - name: includeInactive
          in: query
          required: false
          description: Include employees whose `isActive` flag is false. Defaults to false so consumer pickers don't have to re-filter on the client.
          schema:
            type: boolean
      responses:
        "200":
          description: List of field employees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FieldEmployee"
    post:
      operationId: createFieldEmployee
      tags: [fieldEmployees]
      summary: Create a field employee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFieldEmployeeBody"
      responses:
        "201":
          description: Field employee created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FieldEmployee"

  /field-employees/{id}/restore:
    post:
      operationId: restoreFieldEmployee
      tags: [fieldEmployees]
      summary: Restore a soft-deleted field employee (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Field employee restored
        "401":
          description: Admin login required
        "404":
          description: Field employee not found

  /field-employees/{id}:
    get:
      operationId: getFieldEmployee
      tags: [fieldEmployees]
      summary: Get field employee by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Field employee details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FieldEmployee"

  # ── Field Employee Login Credentials ──
  # Admin/vendor-only endpoints for managing the linked `users` row that
  # lets a field employee sign in to the mobile app. The optional
  # `preferredLanguage` field seeds (or updates) the new login's default
  # UI language so the field user lands in their preferred locale on the
  # very first sign-in.
  /field-employees/{id}/login:
    get:
      operationId: getFieldEmployeeLogin
      tags: [fieldEmployees]
      summary: Get the login status for a field employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Login status (whether a linked user exists, and its email)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FieldEmployeeLoginStatus"
        "401":
          description: Admin or vendor login required
        "404":
          description: Field employee not found
    post:
      operationId: setFieldEmployeeLogin
      tags: [fieldEmployees]
      summary: Create or update a field employee's login credentials
      description: |
        Sets (or rotates) the email/password used by this field employee to
        sign in. Pass `preferredLanguage` to seed the new login's default
        UI language. When updating an existing login, omit
        `preferredLanguage` to preserve whatever the user has already
        chosen — only set it explicitly when an admin is overriding the
        stored preference.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetFieldEmployeeLoginBody"
      responses:
        "200":
          description: Existing credentials updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetFieldEmployeeLoginResponse"
        "201":
          description: New login created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetFieldEmployeeLoginResponse"
        "400":
          description: Missing email/password, weak password, or invalid `preferredLanguage`
        "401":
          description: Admin or vendor login required
        "403":
          description: Vendor user trying to manage an employee outside their vendor
        "404":
          description: Field employee not found
        "409":
          description: Email already in use, or linked user is not a field_employee account
    delete:
      operationId: deleteFieldEmployeeLogin
      tags: [fieldEmployees]
      summary: Disable a field employee's login (deletes the linked user)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Login disabled (no-op when the employee had no linked login)
        "401":
          description: Admin or vendor login required
        "403":
          description: Vendor user trying to manage an employee outside their vendor
        "404":
          description: Field employee not found

  /field-employees/bulk-login:
    post:
      operationId: bulkSetFieldEmployeeLogins
      tags: [fieldEmployees]
      summary: Create or update login credentials for many field employees at once
      description: |
        Batch variant of `POST /field-employees/{id}/login` for CSV-style
        admin onboarding. Each row may include an optional
        `preferredLanguage` (or legacy `language`) field to seed the new
        login's default UI language. Up to 500 rows per request.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkFieldEmployeeLoginBody"
      responses:
        "200":
          description: Batch result (some or all rows succeeded)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkFieldEmployeeLoginResponse"
        "400":
          description: Empty/oversized rows array, or every row failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkFieldEmployeeLoginResponse"
        "401":
          description: Admin or vendor login required

  # ── Employee Certifications ──
  /field-employees/{employeeId}/certifications:
    get:
      operationId: listEmployeeCertifications
      tags: [fieldEmployees]
      summary: List certifications for a field employee
      parameters:
        - name: employeeId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Certifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmployeeCertification"
    post:
      operationId: createEmployeeCertification
      tags: [fieldEmployees]
      summary: Add a certification
      parameters:
        - name: employeeId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeeCertificationBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeCertification"

  /field-employees/{employeeId}/certifications/{certId}:
    patch:
      operationId: updateEmployeeCertification
      tags: [fieldEmployees]
      summary: Update a certification
      parameters:
        - { name: employeeId, in: path, required: true, schema: { type: integer } }
        - { name: certId, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEmployeeCertificationBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeCertification"
    delete:
      operationId: deleteEmployeeCertification
      tags: [fieldEmployees]
      summary: Soft-delete a certification
      parameters:
        - { name: employeeId, in: path, required: true, schema: { type: integer } }
        - { name: certId, in: path, required: true, schema: { type: integer } }
      responses:
        "204":
          description: Deleted

  /field-employees/{employeeId}/compliance-token:
    get:
      operationId: getComplianceToken
      tags: [fieldEmployees]
      summary: Get a signed verify-token for this employee's compliance card
      parameters:
        - { name: employeeId, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Token
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  verifyUrl: { type: string }
                required: [token, verifyUrl]

  /verify/employee/{token}:
    get:
      operationId: verifyEmployeeCompliance
      tags: [fieldEmployees]
      summary: Public compliance verification endpoint (scan-from-QR)
      parameters:
        - { name: token, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Compliance card payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceVerifyResponse"

  # ── Field Employee Portal (QR code landing) ──
  /portal/{siteCode}:
    get:
      operationId: getPortalInfo
      tags: [tickets]
      summary: Get site info for field employee portal (QR code landing)
      parameters:
        - name: siteCode
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Portal information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortalInfo"

  /portal/{siteCode}/open-tickets:
    get:
      operationId: getPortalOpenTickets
      tags: [tickets]
      summary: Get open tickets for a site (for continue ticket)
      parameters:
        - name: siteCode
          in: path
          required: true
          schema:
            type: string
        - name: vendorId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Open tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ticket"

  # ── Tickets ──
  /tickets:
    get:
      operationId: listTickets
      tags: [tickets]
      summary: List tickets with optional filters
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [draft, initiated, in_progress, pending_review, completed, submitted, approved, kicked_back, cancelled, awaiting_acceptance, denied, awaiting_payment, funds_dispersed]
        - name: siteLocationId
          in: query
          required: false
          schema:
            type: integer
        - name: vendorId
          in: query
          required: false
          schema:
            type: integer
        - name: partnerId
          in: query
          required: false
          schema:
            type: integer
        - name: awaitingPayment
          in: query
          required: false
          description: When true, returns only tickets that are approved and not yet funds_dispersed (the AP queue).
          schema:
            type: boolean
      responses:
        "200":
          description: List of tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ticket"
    post:
      operationId: createTicket
      tags: [tickets]
      summary: Create a new ticket (field employee check-in)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTicketBody"
      responses:
        "201":
          description: Ticket created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"

  /tickets/{id}:
    get:
      operationId: getTicket
      tags: [tickets]
      summary: Get ticket by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ticket details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"
    patch:
      operationId: updateTicket
      tags: [tickets]
      summary: Update ticket details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTicketBody"
      responses:
        "200":
          description: Ticket updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"

  /tickets/{id}/en-route:
    post:
      operationId: enRouteTicket
      tags: [tickets]
      summary: Mark field employee as en route to the site (returns Maps URL)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnRouteBody"
      responses:
        "200":
          description: En route recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnRouteResponse"
        "409":
          description: |
            Ticket state conflict — the ticket's lifecycle/status no
            longer permits the en-route transition. Emits
            `ticket_en_route_invalid_state` on the `error` field.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketStateConflictError"

  /tickets/{id}/check-in:
    post:
      operationId: checkInTicket
      tags: [tickets]
      summary: Check in to site for a ticket (captures GPS)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GpsLocationBody"
      responses:
        "200":
          description: Checked in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"
        "409":
          description: |
            Ticket state conflict — the ticket's status no longer
            permits a check-in. Emits `ticket_not_checkinable` on the
            `error` field.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketStateConflictError"

  /tickets/{id}/check-out:
    post:
      operationId: checkOutTicket
      tags: [tickets]
      summary: Check out from site for a ticket (captures GPS)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckOutBody"
      responses:
        "200":
          description: Checked out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"

  /tickets/{id}/submit:
    post:
      operationId: submitTicket
      tags: [tickets]
      summary: Vendor submits ticket for partner review
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ticket submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"

  /tickets/{id}/approve:
    post:
      operationId: approveTicket
      tags: [tickets]
      summary: Partner approves ticket for payment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ticket approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"

  /tickets/{id}/disperse-funds:
    post:
      operationId: disperseFundsTicket
      tags: [tickets]
      summary: Partner AP records the payment that closes the ticket loop (status → funds_dispersed)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DisperseFundsBody"
      responses:
        "200":
          description: Ticket marked funds_dispersed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"

  /tickets/{id}/reverse-funds-dispersal:
    post:
      operationId: reverseFundsDispersal
      tags: [tickets]
      summary: Admin reverses a funds_dispersed ticket back to approved (clears payment columns)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReverseFundsDispersalBody"
      responses:
        "200":
          description: Ticket dispersal reversed (status → approved, payment columns cleared)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"

  /tickets/{id}/reverse-dispersal:
    post:
      operationId: reverseDispersal
      tags: [tickets]
      summary: Admin or partner-AP reverses a funds_dispersed ticket (Task #853)
      description: |
        Same payment-column clearing semantics as
        /tickets/:id/reverse-funds-dispersal, but gated by the
        broader `viewerCanDisperseFunds` capability so that a partner
        Accounts-Payable user can correct their own miskeyed dispersal
        from the field without paging an admin. Snapshots actor + reason
        + the cleared payment columns into a `payment_audit` row.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReverseDispersalBody"
      responses:
        "200":
          description: Ticket dispersal reversed (status → approved, payment columns cleared, payment_audit row written)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"

  /tickets/{id}/kickback:
    post:
      operationId: kickbackTicket
      tags: [tickets]
      summary: Partner kicks back ticket to vendor for correction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KickbackBody"
      responses:
        "200":
          description: Ticket kicked back
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"

  /tickets/{id}/unlock:
    post:
      operationId: unlockTicket
      tags: [tickets]
      summary: Admin unlocks a submitted or approved ticket so it can be edited again
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UnlockTicketBody"
      responses:
        "200":
          description: Ticket unlocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"

  /tickets/{id}/unlocks:
    get:
      operationId: getTicketUnlocks
      tags: [tickets]
      summary: Get the full unlock history for a ticket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Unlock history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TicketUnlock"

  /tickets/{id}/transitions:
    get:
      operationId: getTicketTransitions
      tags: [tickets]
      summary: |
        Chronological audit trail of every status transition recorded for
        the ticket. Backed by `ticket_status_history`. Reasons that
        reference vendor IDs (the partner-self-service reinvite flow
        records `reassigned from vendor #X to vendor #Y`) are enriched
        server-side so the UI can render vendor names without a follow-up
        round-trip.

        Task #857: optional query filters mirror the Audit Trail filter
        chips on the web ticket-detail page (kind/actorRole/from/to).
        Filtering is applied server-side so a CSV export can be produced
        from exactly the same row set the UI is showing. The CSV form
        is requested by appending `?format=csv` to the same URL.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: kind
          in: query
          required: false
          description: |
            Restrict to one or more derived transition kinds. The kind is
            computed server-side from `(fromStatus → toStatus)` so the UI
            and CSV agree on the categorization. Repeat the parameter to
            request multiple kinds (e.g. `?kind=denied&kind=cancelled`).
          schema:
            type: array
            items:
              type: string
              enum:
                [
                  created,
                  invite_sent,
                  accepted,
                  denied,
                  reinvited,
                  cancelled,
                  reactivated,
                  reopened,
                  other,
                ]
          style: form
          explode: true
        - name: actorRole
          in: query
          required: false
          description: |
            Restrict to rows whose `actorRole` matches. Repeat the
            parameter to request multiple roles. Use the literal value
            `system` to match rows with a NULL actor (system-generated
            transitions such as automatic re-opens).
          schema:
            type: array
            items:
              type: string
              enum: [admin, partner, vendor, field_employee, system]
          style: form
          explode: true
        - name: from
          in: query
          required: false
          description: Inclusive lower bound on `createdAt` (ISO-8601).
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          description: Inclusive upper bound on `createdAt` (ISO-8601).
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Status transitions, oldest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TicketTransition"
            text/csv:
              schema:
                type: string
                description: |
                  Returned when the caller appends `?format=csv`. Headers:
                  `id,ticketId,createdAt,fromStatus,toStatus,kind,actorName,actorRole,reason`.

  /tickets/transitions/aggregate/vendor/{vendorId}:
    get:
      operationId: getVendorTransitionAggregate
      tags: [tickets]
      summary: |
        Task #858 — vendor scorecard rollup of `ticket_status_history`.
        Returns the top denial reasons attributed to this vendor's users
        (deny transitions where the actor is in the vendor's org) plus
        the accept rate (accept / (accept + deny)) over invites the
        vendor responded to.
      parameters:
        - name: vendorId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Vendor transition aggregate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorTransitionAggregate"

  /tickets/transitions/aggregate/partner/{partnerId}:
    get:
      operationId: getPartnerTransitionAggregate
      tags: [tickets]
      summary: |
        Task #858 — partner KPI rollup of `ticket_status_history`.
        Returns mean time-to-acceptance: the average delta between an
        invite (`* → awaiting_acceptance`) and the immediately following
        acceptance (`awaiting_acceptance → initiated`) for tickets at
        the partner's sites.
      parameters:
        - name: partnerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Partner transition aggregate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartnerTransitionAggregate"

  /tickets/transitions/aggregate/admin/reassignments:
    get:
      operationId: getAdminReassignmentAggregate
      tags: [tickets]
      summary: |
        Task #858 — admin "Reassignments" tile rollup of
        `ticket_status_history`. Counts tickets that bounced through
        2+ vendors (i.e. accumulated 2+ `awaiting_acceptance` entries)
        and returns a drilldown of the most-bounced tickets so the
        admin can click through to the per-ticket audit trail.
      responses:
        "200":
          description: Admin reassignment aggregate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminReassignmentAggregate"
        "403":
          description: Admin only
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /tickets/{id}/accept:
    post:
      operationId: acceptTicket
      tags: [tickets]
      summary: Vendor accepts a partner-self-service invite (awaiting_acceptance → initiated)
      parameters:
        - name: id
          in: path
