    # ── Hotlist statuses ──
    # Source-of-truth enums for the hotlist job and bid status pills
    # rendered in `artifacts/vndrly/src/components/hotlist-section.tsx`
    # (`StatusBadge` and `HotlistStatusPill`). Both badges type their
    # color map as `Record<HotlistJobStatus | HotlistBidStatus, …>` so
    # adding a new status to either enum here forces a typecheck error
    # in the badge components until a color bucket is wired up — same
    # drift-prevention pattern as `SiteLocationStatus` (Task #130 /
    # task that introduced this).
    HotlistJobStatus:
      type: string
      description: |
        Lifecycle state of a `hotlist_jobs` row. `open` is the default
        state when a partner posts a job; `awarded` is set when a bid
        wins (either via the bid auction or via partner direct-award).
      enum: [open, awarded]

    HotlistBidStatus:
      type: string
      description: |
        Lifecycle state of a `hotlist_bids` row. `pending` is the
        default state when a vendor places a bid; the partner's award
        flow flips the winning bid to `awarded` and the rest on the
        same job to `declined`.
      enum: [pending, awarded, declined]

    # Task #848 — Direct Award candidate row. Shape mirrors the response
    # of `GET /tickets/direct-award/candidates`. Ineligible vendors are
    # still returned (with `eligible:false`) so the partner UI can grey
    # them out and surface the reason inline instead of letting the
    # partner click through to a server-side rejection.
    DirectAwardCandidateTier:
