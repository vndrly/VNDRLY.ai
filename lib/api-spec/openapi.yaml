              schema:
                $ref: "#/components/schemas/OnboardingProgress"

  /onboarding/{orgType}/{orgId}/complete:
    post:
      operationId: completeOnboarding
      tags: [onboarding]
      summary: Mark onboarding complete
      parameters:
        - { name: orgType, in: path, required: true, schema: { type: string, enum: [partner, vendor] } }
        - { name: orgId, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingProgress"

  /onboarding/field/by-token/{token}:
    get:
      operationId: getFieldOnboardingByToken
      tags: [onboarding]
      summary: Resolve a field-employee invite token
      description: |
        Public endpoint. Given a one-time invite token, returns the
        in-progress employee summary so the wizard can pre-fill name
        and email. Used by the field-employee onboarding page launched
        from an emailed invite link.
      parameters:
        - { name: token, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Token resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FieldOnboardingTokenResponse"
        "404":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }
                required: [error]

  /onboarding/field/by-token/{token}/language:
    put:
      operationId: updateFieldOnboardingLanguage
      tags: [onboarding]
      summary: Persist the invitee's English/Español toggle pre-auth
      description: |
        Public endpoint. Lets a still-anonymous field-employee
        invitee persist the language toggle on the public onboarding
        page to `vendor_people.preferred_language` *before* they
        finish set-password. The token-mode assistant route reads
        this column to prime in Spanish from the very first turn.
      parameters:
        - { name: token, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFieldOnboardingLanguageBody"
      responses:
        "200":
          description: Language persisted (or explicitly cleared)
          content:
            application/json:
              schema:
                type: object
                properties:
                  preferredLanguage: { type: string, enum: [en, es], nullable: true }
                required: [preferredLanguage]
        "400":
          description: preferredLanguage was not "en", "es", or null
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }
                required: [error]
        "404":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }
                required: [error]

  /onboarding/field/by-token/{token}/complete:
    post:
      operationId: completeFieldOnboarding
      tags: [onboarding]
      summary: Finish field-employee onboarding (set credentials, log in)
      description: |
        Public endpoint. Accepts the wizard payload (personal info,
        photo, certifications-light, password, language preference),
        creates the user + membership, clears the invite token, and
        sets the session cookie so the user lands on `/field` already
        signed in.
      parameters:
        - { name: token, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteFieldOnboardingBody"
      responses:
        "200":
          description: Completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingStartResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }
                required: [error]

  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned upload URL
      description: |
        Returns a one-time presigned PUT URL the caller can stream
        the file bytes to, plus the canonical `objectPath` to use
        in subsequent reads. The body carries the file metadata
        only — never the file itself.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestUploadUrlBody"
      responses:
        "200":
          description: Upload URL issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestUploadUrlResponse"

  /storage/uploads/finalize:
    post:
      operationId: finalizeUpload
      tags: [storage]
      summary: Stamp ACL on a freshly-uploaded object
      description: |
        Called after the client PUTs the file bytes to the
        presigned URL. Records the owner + visibility ACL so the
        object can be served back through `GET /storage/objects/*`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FinalizeUploadBody"
      responses:
        "200":
          description: ACL stamped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinalizeUploadResponse"

  /field-employees/{id}/onboarding-invite:
    post:
      operationId: createFieldOnboardingInvite
      tags: [onboarding]
      summary: Generate a field-employee onboarding invite link
      description: |
        Generates (or rotates) a one-time invite token for the
        specified field employee and emails the resulting wizard link
        to their address. Admin or vendor-admin only.
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Invite issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FieldOnboardingInviteResponse"

  # ── Org members (Partner / Vendor admin) ──
  /orgs/{orgType}/{orgId}/members:
    get:
      operationId: listOrgMembers
      tags: [orgMembers]
      summary: List members attached to an org
      description: |
        Returns every `user_org_memberships` row attached to the
        given Partner or Vendor org along with the joined user
        identity columns. Unlike the add / remove / patch siblings
        which deliberately reject `field_employee` rows, the listing
        surfaces them read-only so an org admin can see the full
        roster — including field-employee logins managed via the
        field-employee tools — without being able to mutate them
        from this UI. Rows are ordered by membership id (insertion
        order) so the table is stable across reloads. Auth matches
        the other endpoints in this family: a system admin (legacy
        `users.role = 'admin'`) can view any org; otherwise the
        caller must hold an admin-role membership in this org.
      parameters:
        - { name: orgType, in: path, required: true, schema: { type: string, enum: [partner, vendor] } }
        - { name: orgId, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Members list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListOrgMembersResponse"
        "400":
          description: |
            `code = members.invalid_org` — `orgType` was not
            `partner` / `vendor` or `orgId` was not numeric.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgMemberErrorResponse"
    post:
      operationId: addOrgMember
      tags: [orgMembers]
      summary: Add a member to an org
      description: |
        Attaches a login to a Partner or Vendor org via
        `user_org_memberships`. If a user already exists for `email`
        their account is left untouched (an org admin must not be
        able to reset credentials for any login they happen to know
        the email of) and the supplied `password` / `displayName`
        are silently ignored. If no user exists, a brand-new login
        is created using `password` (min 8 chars, required for new
        logins) and `displayName` (defaults to `email`). User
        creation and membership insert run in a single transaction
        so we never leave behind an orphan user account when
        membership insertion fails. Field-employee logins are
        rejected with `members.is_field_employee` — those are
        managed via the field-employee tools which own their own
        membership sync.
      parameters:
        - { name: orgType, in: path, required: true, schema: { type: string, enum: [partner, vendor] } }
        - { name: orgId, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddOrgMemberBody"
      responses:
        "200":
          description: |
            Existing login was attached (or membership already
            existed and its role was updated in place).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddOrgMemberResponse"
        "201":
          description: A new login was created and attached.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddOrgMemberResponse"
        "400":
          description: |
            Validation error. `code` is one of:
              * `members.invalid_org` — `orgType` was not
                `partner` / `vendor` or `orgId` was not numeric.
              * `members.missing_email` — `email` was empty.
              * `members.weak_password` — creating a brand-new
                login but `password` was missing or shorter than
                8 characters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgMemberErrorResponse"
        "404":
          description: |
            Org does not exist (`code = members.org_not_found`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgMemberErrorResponse"
        "409":
          description: |
            Target login is a field employee
            (`code = members.is_field_employee`); use the
            field-employee tools instead.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgMemberErrorResponse"
        "500":
          description: |
            Generic add failure (`code = members.add_failed`).
            Driver-level error codes are deliberately collapsed
            into `members.add_failed` so the client never sees an
            unstable, low-level identifier it has no branch for.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgMemberErrorResponse"

  /orgs/{orgType}/{orgId}/members/{membershipId}:
    patch:
      operationId: updateOrgMemberRole
      tags: [orgMembers]
      summary: Update an org member's role
      description: |
        Lets an org admin promote an existing teammate to Accounts
        Payable (`ap`, partner orgs only) — or back down to plain
        `member` / up to `admin` — without having to delete and
        recreate the login. Field-employee memberships stay locked to
        the field-employee tools (they own their own sync) and
        respond with `members.field_only`. The only-admin-on-the-org
        guard returns `members.cant_demote_self` to keep an org from
        accidentally locking itself out. No-op writes (role unchanged)
        short-circuit and return the row as-is so the client can
        patch UI optimistically without a 304 round-trip.
      parameters:
        - { name: orgType, in: path, required: true, schema: { type: string, enum: [partner, vendor] } }
        - { name: orgId, in: path, required: true, schema: { type: integer } }
        - { name: membershipId, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrgMemberRoleBody"
      responses:
        "200":
          description: Role updated (or unchanged no-op)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateOrgMemberRoleResponse"
        "400":
          description: |
            Validation error. `code` is one of:
              * `members.invalid_role` — `role` was missing or not in
                `{admin, member}` (or `{admin, member, ap}` for
                partner orgs).
              * `members.field_only` — target membership is a
                field-employee row; managed via the field tools.
              * `members.cant_demote_self` — caller is the only
                admin on the org and tried to demote themselves.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgMemberErrorResponse"
        "404":
          description: |
            Membership does not exist or does not belong to this org
            (`code = members.not_found`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgMemberErrorResponse"
    delete:
      operationId: removeOrgMember
      tags: [orgMembers]
      summary: Remove a member from an org
      description: |
        Detaches the membership from the org. The user account
        itself is preserved because they may belong to other orgs
        the caller can't see — only the row in
        `user_org_memberships` is removed. `activeMembershipId`
        cleanup happens inside the same call so the next time the
        user logs in they fall through to whichever org context is
        still available. Field-employee memberships are rejected
        with `members.field_only` (managed via the field-employee
        tools) and an org admin can't delete their own active
        membership and lock themselves out
        (`members.cant_remove_self`).
      parameters:
        - { name: orgType, in: path, required: true, schema: { type: string, enum: [partner, vendor] } }
        - { name: orgId, in: path, required: true, schema: { type: integer } }
        - { name: membershipId, in: path, required: true, schema: { type: integer } }
      responses:
        "204":
          description: Membership removed
        "400":
          description: |
            Validation error. `code` is one of:
              * `members.invalid_org` — `orgType` was not
                `partner` / `vendor` or `orgId` was not numeric.
              * `members.invalid_params` — `membershipId` was not
                numeric.
              * `members.field_only` — target membership is a
                field-employee row; managed via the field tools.
              * `members.cant_remove_self` — caller is an org
                admin (not a system admin) and tried to remove
                their own membership.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgMemberErrorResponse"
        "404":
          description: |
            Membership does not exist or does not belong to this org
            (`code = members.not_found`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgMemberErrorResponse"

  # ── Field (mobile self-service) ──
  # The /field/* family backs the field-mobile app. All endpoints
  # require a field-employee session cookie and operate on the calling
  # employee's own data (no `:employeeId` parameter — the server
  # resolves the employee from the session).
  /field/me:
    get:
      operationId: getFieldMe
      tags: [field]
      summary: Get the current field employee's profile
      description: |
        Returns the merged vendor_people + vendors row used by the
        mobile profile screen and the live-location reporter to
        determine which vendor the user belongs to.
      responses:
        "200":
          description: Field employee profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FieldMe"
        "401":
          description: Field employee login required
        "403":
          description: Field account not active
    patch:
      operationId: updateFieldMe
      tags: [field]
      summary: Update the current field employee's profile
      description: |
        Partial update — only fields present in the body are written.
        Setting `pecExpirationDate` to null clears `pecCertification`;
        setting it to a YYYY-MM-DD value flips `pecCertification` to
        true. Name changes are mirrored to the linked `users.displayName`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFieldMeBody"
      responses:
        "200":
          description: Updated profile fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateFieldMeResponse"
        "400":
          description: Validation error (e.g. empty firstName, malformed date)

  /field/me/password:
    post:
      operationId: changeFieldPassword
      tags: [field]
      summary: Change the current field employee's password
      description: |
        Verifies `currentPassword` then writes a new bcrypt hash. New
        password must be at least 8 characters. Returns 204 on success.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeFieldPasswordBody"
      responses:
        "204":
          description: Password updated
        "400":
          description: Missing fields or new password too short
        "401":
          description: Current password is incorrect

  /field/history:
    get:
      operationId: listFieldHistory
      tags: [field]
      summary: List closed/past tickets for the current field employee
      description: |
        Returns up to 100 of the most recent tickets owned by the
        calling employee whose status is in {completed, submitted,
        approved, cancelled}, newest first. Drives the mobile history
        screen.
      responses:
        "200":
          description: Past tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FieldHistoryTicket"

  /field/sites:
    get:
      operationId: listFieldSites
      tags: [field]
      summary: List sites this field employee's vendor is assigned to
      description: |
        Distinct `site_locations` rows that have at least one
        `site_work_assignments` row for the calling employee's vendor.
        Powers the site picker in the new-ticket flow.
      responses:
        "200":
          description: Approved sites
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FieldSite"

  /field/sites/{siteId}/work-types:
    get:
      operationId: listFieldSiteWorkTypes
      tags: [field]
      summary: List approved work types for a site (for the calling vendor)
      description: |
        Work types that the calling employee's vendor is approved to
        perform at the given site. Drives the work-type picker in the
        new-ticket flow after a site has been chosen.
      parameters:
        - name: siteId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Approved work types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FieldSiteWorkType"
        "400":
          description: Invalid siteId

  /field/open-tickets:
    get:
      operationId: listFieldOpenTickets
      tags: [field]
      summary: List open tickets owned by the current field employee
      description: |
        Returns the tickets owned by the calling employee whose status
        is in {initiated, draft, in_progress, kicked_back,
        pending_review}, newest first. Drives the home screen's
        "open tickets" section.
      responses:
        "200":
          description: Open tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FieldOpenTicketRow"

  /field/open-tickets/{id}:
    get:
      operationId: getFieldOpenTicket
      tags: [field]
      summary: Get a single open-ticket row for the current field employee
      description: |
        Companion to `GET /field/open-tickets` that returns the same
        denormalized row shape for one ticket. The mobile home screen
        uses this for the surgical per-row refresh on a foreground
        `ticket_unblocked` push so a single ticket transition no
        longer triggers a full list refetch on a slow link.

        Visibility rules mirror the list endpoint exactly: the row is
        only returned when the ticket is still owned by (this
        employee's vendor, this employee) and is still in one of the
        five "open" statuses. Anything else responds 404 so the
        client can drop the row from local state (e.g. the office
        reassigned the ticket to a different field employee, or the
        worker closed it in another tab).
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Open ticket row
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FieldOpenTicketRow"
        "400":
          description: Invalid ticket id (non-integer or < 1)
        "404":
          description: Ticket no longer visible to this employee (reassigned, closed, or never existed)

  /field/tickets:
    post:
      operationId: createFieldTicket
      tags: [field]
      summary: Create a ticket as the current field employee (with auto check-in)
      description: |
        Creates a `vendor_field_self_service` ticket and, if the
        device's GPS lands inside the site's geofence (or the call is
        flagged as an `adjacent` ticket alongside an existing on-site
        ticket on the same location), auto-checks the employee in
        and starts the ticket in `in_progress` with
        `lifecycleState = on_site`. Otherwise the ticket starts in
        `initiated` with `lifecycleState = pending_arrival`.

        On miss, returns one of the structured `error` codes in
        `CreateFieldTicketError` so the mobile new-ticket form can
        surface the validation under the correct picker.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFieldTicketBody"
      responses:
        "201":
          description: Ticket created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FieldCreatedTicket"
        "400":
          description: |
            Validation error. Body shape is `CreateFieldTicketError`
            for `site_not_found`, `site_vendor_mismatch`, and
            `work_type_not_allowed`; falls back to a `{message}`
            envelope for missing required fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateFieldTicketError"

  /field/push-token:
    post:
      operationId: registerFieldPushToken
      tags: [field]
      summary: Register an Expo push token for the current field employee
      description: |
        Upserts an `expo_token` row keyed on the token string so the
        backend can fan push notifications out to this device. Safe to
        call repeatedly on every app launch.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FieldPushTokenBody"
      responses:
        "204":
          description: Token saved
        "400":
          description: Token missing or wrong type
    delete:
      operationId: deleteFieldPushToken
      tags: [field]
      summary: Unregister a previously-registered Expo push token
      description: |
        Deletes the row for the given Expo token (typically called on
        sign-out so future pushes don't continue going to the device).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FieldDeletePushTokenBody"
      responses:
        "204":
          description: Token removed
        "400":
          description: Token missing

  /me/upcoming-schedule:
    get:
      operationId: listUpcomingSchedule
      tags: [field]
      summary: List the current user's upcoming scheduled tickets
      description: |
        Returns tickets the calling user is either the foreman of or
        crewed onto whose `scheduledStartAt` falls in the
        `[now - 1h, now + days]` window, ordered by `scheduledStartAt`
        ascending. Drives the mobile Schedule tab.

        Visibility is computed from the session: the server resolves
        the calling user's `vendor_people` row (if any) and pulls
        every active `ticket_crew` row plus every ticket where
        `tickets.foremanUserId` matches the session user. The 1-hour
        lookback keeps a ticket on the list while it's actively
        starting.
      parameters:
        - name: days
          in: query
          required: false
          description: |
            Look-ahead horizon in days (clamped to `[1, 60]`,
            defaulting to `14` when omitted or non-numeric).
          schema:
            type: integer
            minimum: 1
            maximum: 60
            default: 14
      responses:
        "200":
          description: Upcoming scheduled tickets for the current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpcomingScheduleResponse"
        "401":
          description: Not authenticated

  # ── Reports: export audit log ──
  /reports/exports/audit:
    get:
      operationId: getExportsAuditLog
      tags: [reports]
      summary: Admin paginated audit log of every report export
      description: |
        Admin-only. Returns one row per externally-shareable artifact
        produced by the Reports tab (CSV / PDF / IIF / zip / 1099 /
        accounting-push) plus structured retry-chain metadata for the
        admin audit UI.

        Every row that participates in a multi-step retry chain — as
        the original failed sync, an intermediate hop, or the most
        recent retry — is annotated with `retryChain`, the ordered list
        of audit ids in the entire connected component (oldest →
        newest, inclusive of self). The same chain is attached to every
        member so admins can navigate the chain from either end. Rows
        that are not part of any chain omit the field entirely (rather
        than receiving a singleton `[id]`) so the wire format stays
        compact.

        Ancestors and descendants that fall outside the requested page
        / filter window — and any in-window rows the warnings filter
        hides — are returned in `chainRows` so the UI can render
        complete chain metadata and "Retried by #N" badges without a
        second round-trip per hop.

        Pagination & filtering: `page` is 1-based (default 1). When
        `anchorId` is supplied the server resolves which page actually
        contains the anchor row under the active filter and returns
        that page; if the anchor falls outside the filter the response
        sets `anchorOutsideFilter: true` and falls back to page 1.
        `hasWarnings=true` restricts the visible rows to those with a
        non-empty `detailJson.warnings` array, but `totalWithWarnings`
        is always computed over the unfiltered current page so the
        "N have warnings" header badge stays meaningful regardless of
        whether the filter is on. The legacy `limit` parameter is
        accepted as a synonym for `pageSize` (page is then forced to
        1) for older callers.
      parameters:
        - name: page
          in: query
          required: false
          description: 1-based page index (default 1).
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          required: false
          description: Rows per page (default 100, max 500).
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
        - name: limit
          in: query
          required: false
          description: |
            Legacy synonym for `pageSize`. When `pageSize` is omitted
            but `limit` is set, `limit` is used as the page size and
            `page` is forced to 1.
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: anchorId
          in: query
          required: false
          description: |
            Audit row id the caller wants to jump to. The server
            computes the page that contains it under the active filter
            and returns that page instead of `page`. If the anchor row
            is filtered out the server falls back to page 1 and sets
            `anchorOutsideFilter: true`.
          schema:
            type: integer
            minimum: 1
        - name: from
          in: query
          required: false
          description: |
            Inclusive lower bound on `createdAt` (ISO-8601 with
            offset).
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          description: |
            Exclusive upper bound on `createdAt` (ISO-8601 with
            offset). Matches the half-open convention used by other
            reporting periods.
          schema:
            type: string
            format: date-time
        - name: hasWarnings
          in: query
          required: false
          description: |
            When `true`, restricts the visible rows on the current
            page to those whose `detailJson.warnings` array is
            non-empty. Filtered-out chain participants are still
            returned in `chainRows` so the bidirectional badges keep
            working.
          schema:
            type: string
            enum: [ "true", "false" ]
      responses:
        "200":
          description: Audit page with retry-chain metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportsAuditLogResponse"
        "400":
          description: Invalid query parameters
        "403":
          description: Admin role required

  # ── Platform settings (VNDRLY self-edit) ──
  /public/platform-brand:
    get:
      operationId: getPublicPlatformBrand
      tags: [platform]
      summary: Public VNDRLY platform brand (no auth)
      description: |
        Returns the minimal brand-only subset of the platform_settings
        singleton — `name`, `brandPrimaryColor`, `brandAccentColor`,
        `logoUrl`, `logoSquareUrl`. Intentionally unauthenticated so
        the mobile login screen and other pre-auth surfaces can flex
        their pills/links to the VNDRLY-platform brand color the admin
        configured in the web app, instead of hard-coding a default
        hex. Mirrors the org-level fallback behavior the authenticated
        web `useGetPlatformSettings` already provides.
      responses:
        "200":
          description: Public platform brand
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicPlatformBrand"

  /platform-settings:
    get:
      operationId: getPlatformSettings
      tags: [platform]
      summary: Get VNDRLY platform settings (singleton)
      description: |
        Returns the platform_settings row (id=1). Available to any
        authenticated user so the layout/brand resolver can read
        VNDRLY's own logo and brand colors. Mutating fields require
        admin role via PATCH.
      responses:
        "200":
          description: Platform settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformSettings"
    patch:
      operationId: updatePlatformSettings
      tags: [platform]
      summary: Update VNDRLY platform settings
      description: Admin-only. Partial update of the singleton row.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePlatformSettingsBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformSettings"
        "403":
          description: Admin role required

  # ── IRS FIRE 1099 transmitter settings (singleton) ──
  /admin/1099-transmitter-settings:
    get:
      operationId: getFireTransmitterSettings
      tags: [platform]
      summary: Get IRS FIRE transmitter settings (singleton)
      description: |
        Admin-only. Returns the singleton fire_transmitter_settings row
        used as the source of truth for the T record on every IRS 1099
        FIRE submission. When no row has ever been saved every value is
        returned as null and real (non-test) FIRE downloads are
        blocked. Includes a `missing` array listing required fields
        that are still blank, mirroring the structured guard the
        e-file route enforces.
      responses:
        "200":
          description: Transmitter settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FireTransmitterSettings"
        "403":
          description: Admin role required
    put:
      operationId: updateFireTransmitterSettings
      tags: [platform]
      summary: Save IRS FIRE transmitter settings
      description: |
        Admin-only. Replaces every column on the singleton row in one
        write and appends an audit row capturing the diff and the
        actor. Performs the same validation the FIRE e-file route
        enforces — every field is required and the address must parse
        into city/state/zip — so a successful save means a real
        (non-test) FIRE submission can immediately be generated.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFireTransmitterSettingsBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FireTransmitterSettings"
        "400":
          description: Validation failed
        "403":
          description: Admin role required

  /admin/1099-transmitter-settings/history:
    get:
      operationId: listFireTransmitterSettingsHistory
      tags: [platform]
      summary: List recent IRS FIRE transmitter setting changes (admin only)
      description: |
        Admin-only history view over `fire_transmitter_settings_audit_log`.
        One row per save that actually changed at least one column,
        newest first. Each entry carries the actor (display name + email
        joined from `users` at read time, falling back to NULL if the
        user has since been deleted), the actor role / IP / user-agent
        captured at save time, and the per-field `{ before, after }`
        diff jsonb so the UI can render "admin X changed our IRS TCC
        from … to … on …" without re-deriving state.

        Capped at `limit` rows (default 50, max 200) so the page can
        be paged with `offset`.
      parameters:
        - name: limit
          in: query
          required: false
          description: Max rows to return. Default 50, capped at 200.
          schema:
            type: integer
            minimum: 1
            maximum: 200
        - name: offset
          in: query
          required: false
          description: Skip this many rows before returning. Default 0.
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Paged list of transmitter audit rows (newest first)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListFireTransmitterSettingsHistoryResponse"
        "403":
          description: Admin role required

  # ── Demo-account picker labels (per locale, admin-editable) ──
  /admin/demo-user-labels:
    get:
      operationId: listDemoUserLabels
      tags: [platform]
      summary: List demo accounts with their per-locale label overrides
      description: |
        Admin-only. Returns every demo account (canonical list lives in
        source so seeding stays self-contained) along with its baked-in
        default label per supported locale and any DB overrides set by
        a previous admin edit. Used by the admin UI to render an
        editable per-locale label table; merges with `GET /auth/demo-users`
        at runtime.
      responses:
        "200":
          description: Demo label entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemoUserLabelsResponse"
        "403":
          description: Admin role required
    put:
      operationId: upsertDemoUserLabel
      tags: [platform]
      summary: Upsert (or clear) a single demo-account label override
      description: |
        Admin-only. Upserts the override row for one (username, locale)
        pair. Pass a non-empty `label` to set or replace the override.
        Pass `null` (or an empty string) to delete the override and
        fall back to the source-of-truth default.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertDemoUserLabelOverrideBody"
      responses:
        "200":
          description: Updated demo label entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemoUserLabelsResponse"
        "400":
          description: Invalid input
        "403":
          description: Admin role required
        "404":
          description: Unknown demo username

  # ── VNDRLY system admins ──
  /admin/admins:
    get:
      operationId: listAdminUsers
      tags: [platform]
      summary: List VNDRLY system administrators
      description: Admin-only. Returns all users with role=admin.
      responses:
        "200":
          description: List of admin users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"
        "403":
          description: Admin role required
    post:
      operationId: createAdminUser
      tags: [platform]
      summary: Create a VNDRLY system administrator
      description: |
        Admin-only. Creates a `users` row with role=admin and the
        supplied display name + email. A temporary password is
        generated and returned in the response one time so the
        creating admin can hand it off out-of-band.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAdminUserBody"
      responses:
        "201":
          description: Admin created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAdminUserResponse"
        "403":
          description: Admin role required
        "409":
          description: Email already exists

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ── Reports: export audit log ──
    ExportsAuditLogPushWarning:
      type: object
      description: |
        Single per-row warning attached to an accounting push audit row.
        Mirrors the `PushWarning` shape defined in
        `lib/api-zod/src/push-warnings.ts` and consumed by the digest
        emails — but every field is optional and additional keys are
        allowed so historic / legacy / partially-shaped warnings (some
        of which predate the current contract) are still echoed back to
        admins instead of 500ing the audit page.
      properties:
        kind:
          type: string
        identifier:
          type: string
        message:
          type: string
      additionalProperties: true

    ExportsAuditLogDetailJson:
      type: ["object", "null"]
      description: |
        Free-form per-row detail blob. Today this is only populated for
        accounting pushes (QBO / OA / re-syncs) and carries the
        structured `warnings` list so the admin UI can show exactly
        which rows failed for a given push and re-sync just those rows.
        Stays nullable because the great majority of audit rows
        (downloads) have nothing extra to record. Additional keys are
        permitted so new push kinds can extend the blob without an
        OpenAPI change.
      properties:
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/ExportsAuditLogPushWarning"
      additionalProperties: true

    ExportsAuditLogRow:
      type: object
      description: |
        One row in the `report_export_audit_log` table, returned by
        `GET /reports/exports/audit`. `scope` is the free-form filter
        blob the report was built with (e.g. vendor / partner / period
        ids); `detailJson` carries the after-the-fact warnings list for
        accounting pushes. `retryChain` is present only when the row
        participates in a multi-step retry chain.
      properties:
        id:
          type: integer
        reportKind:
          type: string
        format:
          type: string
        scope:
          type: object
          description: |
            Free-form jsonb blob describing the filter parameters used
            to build the export. Shape varies per `reportKind`.
          additionalProperties: true
        detailJson:
          $ref: "#/components/schemas/ExportsAuditLogDetailJson"
        rowCount:
          type: ["integer", "null"]
        fileBytes:
          type: integer
        downloadedByUserId:
          type: ["integer", "null"]
        userRole:
          type: string
        userIp:
          type: ["string", "null"]
        userAgent:
          type: ["string", "null"]
        accountingDigestEmailedAt:
          type: ["string", "null"]
          format: date-time
        accountingReconciliationDigestEmailedAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        retryChain:
          type: array
          description: |
            Ordered list of audit ids in this row's connected retry
            component (oldest → newest, inclusive of self). Omitted
            entirely when the row is not part of any chain.
          items:
            type: integer
      required:
        - id
        - reportKind
        - format
        - scope
        - detailJson
        - rowCount
        - fileBytes
        - downloadedByUserId
        - userRole
        - userIp
        - userAgent
        - accountingDigestEmailedAt
        - accountingReconciliationDigestEmailedAt
        - createdAt

    ExportsAuditLogResponse:
      type: object
      description: |
        Envelope returned by `GET /reports/exports/audit`. `rows` is
        the visible page after applying every filter; `chainRows`
        carries chain participants the page or filter would otherwise
        hide so the UI can render full retry-chain metadata and
        bidirectional "Retried by #N" badges in a single round-trip.
      properties:
        rows:
          type: array
          items:
            $ref: "#/components/schemas/ExportsAuditLogRow"
        chainRows:
          type: array
          description: |
            Chain participants outside the visible page (out-of-window
            ancestors / descendants, in-window rows the warnings
            filter hid, in-window rows on a different page). Singleton
            (non-chain) rows are never included here.
          items:
            $ref: "#/components/schemas/ExportsAuditLogRow"
        page:
          type: integer
          description: |
            1-based page index actually returned. May differ from the
            requested `page` when `anchorId` was supplied and the
            server resolved the anchor to a different page.
        pageSize:
          type: integer
        totalRows:
          type: integer
          description: Total rows matching the active filter.
        totalWithWarnings:
          type: integer
          description: |
            Count of unfiltered rows on the current page whose
            `detailJson.warnings` array is non-empty. Always computed
            over the unfiltered page so the header badge stays
            meaningful when `hasWarnings=true` is on.
        anchorId:
          type: integer
          description: |
            Echo of the `anchorId` query parameter when one was
            supplied. Omitted otherwise.
        anchorOutsideFilter:
          type: boolean
          description: |
            True when an `anchorId` was supplied but no row matching
            it survived the active filter, in which case the server
            returned page 1 instead of the resolved anchor page.
            Omitted when false.
      required: [rows, chainRows, page, pageSize, totalRows, totalWithWarnings]

    # ── Partner ──
    Partner:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        contactName:
          type: string
        contactEmail:
          type: string
        contactPhone:
          type: ["string", "null"]
        physicalAddress:
          type: ["string", "null"]
        billingAddress:
          type: ["string", "null"]
        businessPhone:
          type: ["string", "null"]
        hoursOfOperation:
          type: ["string", "null"]
        stateTaxId:
          type: ["string", "null"]
        federalTaxId:
          type: ["string", "null"]
        blurb:
          type: ["string", "null"]
        operatingRadiusMiles:
          type: ["integer", "null"]
        logoUrl:
          type: ["string", "null"]
          description: Main logo. May be any aspect ratio. Used in modals and other places that have room for an irregular/larger logo.
        logoSquareUrl:
          type: ["string", "null"]
          description: Square (1:1) logo used for tightly-bounded badges such as the navigation sidebar (rendered at 64x64). Falls back to logoUrl when null.
        brandPrimaryColor:
          type: ["string", "null"]
          description: Hex color string like "#1f7ae0" used for poster borders/accents.
        brandAccentColor:
          type: ["string", "null"]
          description: Hex color string used for secondary accents on branded outputs.
        email1099Subject:
          type: ["string", "null"]
          description: |
            Optional partner-customized subject line for 1099 statement emails sent
            to consenting vendors. Supports the placeholders `{{vendorName}}`,
            `{{partnerName}}`, `{{taxYear}}`, `{{formType}}`, `{{formLabel}}`, and
            `{{totalReportable}}`. When null/blank the deliver endpoint falls back
            to the hardcoded English default.
        email1099Body:
          type: ["string", "null"]
          description: |
            Optional partner-customized plain-text body for 1099 statement emails.
            Same placeholders as `email1099Subject`. Newlines are preserved.
        createdAt:
          type: string
          format: date-time
      required: [id, name, contactName, contactEmail, contactPhone, physicalAddress, billingAddress, businessPhone, hoursOfOperation, stateTaxId, federalTaxId, blurb, operatingRadiusMiles, logoUrl, logoSquareUrl, brandPrimaryColor, brandAccentColor, email1099Subject, email1099Body, createdAt]

    CreatePartnerBody:
      type: object
      properties:
        name:
          type: string
        contactName:
          type: string
        contactEmail:
          type: string
        contactPhone:
          type: ["string", "null"]
        physicalAddress:
          type: ["string", "null"]
        billingAddress:
          type: ["string", "null"]
        brandPrimaryColor:
          type: ["string", "null"]
          pattern: "^#[0-9a-fA-F]{6}$"
          description: Hex color string like "#1f7ae0" used for poster borders/accents.
        brandAccentColor:
          type: ["string", "null"]
          pattern: "^#[0-9a-fA-F]{6}$"
          description: Hex color string used for secondary accents on branded outputs.
      required: [name, contactName, contactEmail]

    UpdatePartnerBody:
      type: object
      properties:
        name:
          type: string
        contactName:
          type: string
        contactEmail:
          type: string
        contactPhone:
          type: ["string", "null"]
        physicalAddress:
          type: ["string", "null"]
        billingAddress:
          type: ["string", "null"]
        businessPhone:
          type: ["string", "null"]
        hoursOfOperation:
          type: ["string", "null"]
        stateTaxId:
          type: ["string", "null"]
        federalTaxId:
          type: ["string", "null"]
        blurb:
          type: ["string", "null"]
        operatingRadiusMiles:
          type: ["integer", "null"]
        logoUrl:
          type: ["string", "null"]
        logoSquareUrl:
          type: ["string", "null"]
          description: Square (1:1) logo for the navigation sidebar (rendered at 64x64). Falls back to logoUrl when null.
        brandPrimaryColor:
          type: ["string", "null"]
          pattern: "^#[0-9a-fA-F]{6}$"
        brandAccentColor:
          type: ["string", "null"]
          pattern: "^#[0-9a-fA-F]{6}$"
        email1099Subject:
          type: ["string", "null"]
          maxLength: 200
          description: |
            Partner-customized subject line for 1099 statement emails. Supports
            the placeholders `{{vendorName}}`, `{{partnerName}}`, `{{taxYear}}`,
            `{{formType}}`, `{{formLabel}}`, and `{{totalReportable}}`.
        email1099Body:
          type: ["string", "null"]
          maxLength: 5000
          description: |
            Partner-customized plain-text body for 1099 statement emails. Same
            placeholders as `email1099Subject`. Newlines are preserved.

    MatchPartnerResponseItem:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        score:
          type: number
      required: [id, name, score]

    MatchPartnerResponse:
      type: object
      properties:
        matches:
          type: array
          items:
            $ref: "#/components/schemas/MatchPartnerResponseItem"
      required: [matches]

    CheckPartnerNameResponseItem:
      type: object
      properties:
        name:
          type: string
        score:
          type: number
      required: [name, score]

    CheckPartnerNameResponse:
      type: object
      properties:
        matches:
          type: array
          items:
            $ref: "#/components/schemas/CheckPartnerNameResponseItem"
      required: [matches]

    # ── Platform settings ──
    PublicPlatformBrand:
      type: object
      description: |
        Brand-only subset of platform_settings exposed via the public
        unauthenticated `/public/platform-brand` endpoint. Intentionally
        omits sensitive admin fields (contact info, addresses, QB
        retention overrides, etc.) so pre-auth mobile/web surfaces can
        read VNDRLY's brand without leaking platform configuration.
      properties:
        name:
          type: string
        brandPrimaryColor:
          type: ["string", "null"]
          pattern: "^#[0-9a-fA-F]{6}$"
        brandAccentColor:
          type: ["string", "null"]
          pattern: "^#[0-9a-fA-F]{6}$"
        logoUrl:
          type: ["string", "null"]
        logoSquareUrl:
          type: ["string", "null"]
      required: [name]

    PlatformSettings:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        contactName:
          type: ["string", "null"]
        contactEmail:
          type: ["string", "null"]
        contactPhone:
          type: ["string", "null"]
        physicalAddress:
          type: ["string", "null"]
        billingAddress:
          type: ["string", "null"]
        businessPhone:
          type: ["string", "null"]
        hoursOfOperation:
          type: ["string", "null"]
        blurb:
          type: ["string", "null"]
        logoUrl:
          type: ["string", "null"]
        logoSquareUrl:
          type: ["string", "null"]
        brandPrimaryColor:
          type: ["string", "null"]
          pattern: "^#[0-9a-fA-F]{6}$"
        brandAccentColor:
          type: ["string", "null"]
          pattern: "^#[0-9a-fA-F]{6}$"
        qbBulkActionRetentionDays:
          description: |
            Admin-tunable override for the QuickBooks bulk-action undo
            retention window (in days). When null, the server falls back
            to the QB_BULK_ACTION_RETENTION_DAYS env var (which itself
            defaults to 90 days). Allowed range: 1..1825 (5 years).
          type: ["integer", "null"]
          minimum: 1
          maximum: 1825
        qbBulkActionRetentionLastChange:
          description: |
            Most recent change to `qbBulkActionRetentionDays`, sourced
            from `platform_settings_audit_log`. Null when the override
            has never been set or cleared by an admin (i.e. the value
            has only ever been the system default).
          oneOf:
            - $ref: "#/components/schemas/PlatformSettingsFieldChange"
            - type: "null"
        updatedAt:
          type: string
          format: date-time
      required: [id, name, updatedAt, qbBulkActionRetentionLastChange]

    PlatformSettingsFieldChange:
      type: object
      description: |
        Most-recent change record for a single audited field on the
        platform_settings singleton. `prevValue`/`newValue` are the
        stringified before/after values; null means "no override / fall
        back to the system default".
      properties:
        changedAt:
          type: string
          format: date-time
        actorUserId:
          type: ["integer", "null"]
        actorDisplayName:
          type: ["string", "null"]
          description: Display name of the actor at audit-write time. Null when the user has since been deleted.
        actorRole:
          type: string
        prevValue:
          type: ["string", "null"]
        newValue:
          type: ["string", "null"]
      required: [changedAt, actorUserId, actorDisplayName, actorRole, prevValue, newValue]

    UpdatePlatformSettingsBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        contactName:
          type: ["string", "null"]
        contactEmail:
          type: ["string", "null"]
        contactPhone:
          type: ["string", "null"]
        physicalAddress:
          type: ["string", "null"]
        billingAddress:
          type: ["string", "null"]
        businessPhone:
          type: ["string", "null"]
        hoursOfOperation:
          type: ["string", "null"]
        blurb:
          type: ["string", "null"]
        logoUrl:
          type: ["string", "null"]
        logoSquareUrl:
          type: ["string", "null"]
        brandPrimaryColor:
          type: ["string", "null"]
          pattern: "^#[0-9a-fA-F]{6}$"
        brandAccentColor:
          type: ["string", "null"]
          pattern: "^#[0-9a-fA-F]{6}$"
        qbBulkActionRetentionDays:
          description: |
            Admin-tunable override for the QuickBooks bulk-action undo
            retention window (in days). Pass null to clear the override
            and fall back to the env-var / 90-day default.
          type: ["integer", "null"]
          minimum: 1
          maximum: 1825

    FireTransmitterSettings:
      type: object
      description: |
        Singleton row of IRS FIRE transmitter info. Each value is null
        when not yet saved (UI shows it as blank); a save replaces all
        seven values together.
      properties:
        tcc:
          type: ["string", "null"]
          description: 5-character Transmitter Control Code assigned by the IRS.
        ein:
          type: ["string", "null"]
          description: Transmitter EIN (9 digits, no dashes).
        name:
          type: ["string", "null"]
          description: Transmitter legal name (40 chars, written into the T record).
        address:
          type: ["string", "null"]
          description: |
            Single-line transmitter mailing address — the FIRE
            generator parses it into street/city/state/zip.
        contactName:
          type: ["string", "null"]
        contactEmail:
          type: ["string", "null"]
        contactPhone:
          type: ["string", "null"]
          description: Digits only, 10-character US phone number.
        updatedAt:
          type: ["string", "null"]
          format: date-time
        updatedByUserId:
          type: ["integer", "null"]
        updatedByName:
          type: ["string", "null"]
          description: |
            Display name of the admin who last saved the row, joined
            from `users.display_name`. Null when no row has been saved
            yet or when the linked user has been deleted.
        updatedByEmail:
          type: ["string", "null"]
          description: |
            Email of the admin who last saved the row, used as a
            fallback in the UI when `updatedByName` is blank.
        missing:
          type: array
          items:
            type: string
          description: |
            Field names that are still blank/unparseable and would
