    TicketTransition:
      type: object
      description: |
        One row from `ticket_status_history`. `displayReason` is the
        server-rewritten copy of `reason` with the partner-self-service
        reinvite vendor IDs (`vendor #N`) substituted for human-readable
        vendor names. `reason` is preserved for tooling/debugging.
      properties:
        id:
          type: integer
        ticketId:
          type: integer
        fromStatus:
          type: string
          nullable: true
        toStatus:
          type: string
        actorUserId:
          type: integer
          nullable: true
        actorName:
          type: string
          nullable: true
        actorRole:
          type: string
          nullable: true
        reason:
          type: string
          nullable: true
        displayReason:
          type: string
          nullable: true
        fromVendorName:
          type: string
          nullable: true
          description: |
            Set on partner-self-service reinvite rows. Resolved from the
            `vendor #X` token at the start of the reason text.
        toVendorName:
          type: string
          nullable: true
          description: |
            Set on partner-self-service reinvite rows. Resolved from the
            `vendor #Y` token at the end of the reason text.
        createdAt:
          type: string
          format: date-time
      required: [id, ticketId, toStatus, createdAt]

    VendorTransitionAggregate:
      type: object
      description: |
        Task #858 — vendor scorecard rollup over `ticket_status_history`.
        Denial reasons are normalised to lower-case before grouping so
        "No truck available" and "no truck available" collapse into one
        bucket. `acceptCount`/`denyCount` are counted from the same
        actor-attributed transitions used to derive the rate.
      properties:
        topDenialReasons:
          type: array
          description: Top 5 deny-transition reasons attributed to this vendor's users.
          items:
            type: object
            properties:
              reason:
                type: string
              count:
                type: integer
            required: [reason, count]
        acceptCount:
          type: integer
        denyCount:
          type: integer
        acceptRatePercent:
          type: integer
          nullable: true
          description: Integer percent (0–100). Null when there were no decisions to derive a rate from.
      required: [topDenialReasons, acceptCount, denyCount, acceptRatePercent]

    PartnerTransitionAggregate:
      type: object
      description: |
        Task #858 — partner KPI rollup over `ticket_status_history`. The
        mean is computed across every accepted invite at any of the
        partner's sites; tickets that were never accepted are excluded.
      properties:
        meanTimeToAcceptanceSeconds:
          type: integer
          nullable: true
          description: |
            Mean delta in whole seconds between an `* → awaiting_acceptance`
            transition and the immediately following `awaiting_acceptance →
            initiated` transition for the same ticket. Null when no invites
            have been accepted yet.
        acceptedInviteCount:
          type: integer
          description: Number of accept transitions averaged into the mean.
      required: [meanTimeToAcceptanceSeconds, acceptedInviteCount]

    AdminReassignmentAggregate:
      type: object
      description: |
        Task #858 — admin reassignment tile rollup. A ticket is counted
        as "bounced" once it has accumulated 2+ `awaiting_acceptance`
        rows in `ticket_status_history`, regardless of whether it has
        been accepted yet. The drilldown lists the top offenders so the
        admin can click through to the per-ticket audit trail.
      properties:
        reassignedTicketCount:
          type: integer
        tickets:
          type: array
          description: Up to 50 tickets, ordered by invite count desc then most recent invite.
          items:
            type: object
            properties:
              ticketId:
                type: integer
              vendorInviteCount:
                type: integer
              status:
                type: string
              currentVendorId:
                type: integer
                nullable: true
              currentVendorName:
                type: string
                nullable: true
              lastInviteAt:
                type: string
                format: date-time
            required: [ticketId, vendorInviteCount, status, currentVendorId, currentVendorName, lastInviteAt]
      required: [reassignedTicketCount, tickets]

