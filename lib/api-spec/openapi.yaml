    # ── Field (mobile self-service) ──
    # Schemas for the /field/* family that backs the field-mobile app.
    # See `artifacts/api-server/src/routes/field.ts` for the source of
    # truth on shape and validation.
    FieldMe:
      type: object
      description: |
        Current field employee profile, returned by `GET /field/me`.
        Merges columns from `vendor_people` and the linked `vendors`
        row so the mobile profile screen can render in a single round
        trip.
      properties:
        employeeId: { type: integer }
        firstName: { type: string }
        lastName: { type: string }
        email: { type: ["string", "null"] }
        vendorId: { type: ["integer", "null"] }
        vendorName: { type: ["string", "null"] }
        jobTitle: { type: ["string", "null"] }
        phone: { type: ["string", "null"] }
        pecExpirationDate: { type: ["string", "null"] }
        pecCertification: { type: boolean }
        vendorLogoUrl: { type: ["string", "null"] }
        profilePhotoPath: { type: ["string", "null"] }
        photoUrl: { type: ["string", "null"] }
      required:
        [
          employeeId,
          firstName,
          lastName,
          email,
          vendorId,
          vendorName,
          jobTitle,
          phone,
          pecExpirationDate,
          pecCertification,
          vendorLogoUrl,
          profilePhotoPath,
          photoUrl,
        ]

    UpdateFieldMeBody:
      type: object
      description: |
        Partial-update body for `PATCH /field/me`. Only fields present
        in the body are written. `pecExpirationDate` must be a
        `YYYY-MM-DD` string when non-null; passing null clears the
        date and flips `pecCertification` to false.
      properties:
        profilePhotoPath: { type: ["string", "null"] }
        firstName: { type: string }
        lastName: { type: string }
        jobTitle: { type: ["string", "null"] }
        phone: { type: ["string", "null"] }
        pecExpirationDate: { type: ["string", "null"] }

    UpdateFieldMeResponse:
      type: object
      description: |
        Response shape from `PATCH /field/me` — the post-update subset
        of the profile that the client needs to refresh local state.
      properties:
        profilePhotoPath: { type: ["string", "null"] }
        jobTitle: { type: ["string", "null"] }
        phone: { type: ["string", "null"] }
        firstName: { type: string }
        lastName: { type: string }
        pecExpirationDate: { type: ["string", "null"] }
        pecCertification: { type: boolean }

    ChangeFieldPasswordBody:
      type: object
      properties:
        currentPassword: { type: string }
        newPassword: { type: string, minLength: 8 }
      required: [currentPassword, newPassword]

    FieldHistoryTicket:
      type: object
      description: |
        Denormalized "past ticket" row returned by `GET /field/history`
        for the mobile history screen.
      properties:
        id: { type: integer }
        status:
          $ref: "#/components/schemas/TicketStatus"
        checkInTime: { type: ["string", "null"], format: date-time }
        checkOutTime: { type: ["string", "null"], format: date-time }
        siteLocationId: { type: ["integer", "null"] }
        siteName: { type: ["string", "null"] }
        partnerName: { type: ["string", "null"] }
        workTypeId: { type: ["integer", "null"] }
        workTypeName: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        updatedAt:
          type: ["string", "null"]
          format: date-time
          description: |
            Last write to the underlying ticket row. Drives the mobile
            history pill's 7-day inactivity escalation (see
            artifacts/vndrly-mobile/lib/ticketStatusLabels.ts), mirroring
            the web TicketStatusBadge behavior.
      required:
        [
          id,
          status,
          checkInTime,
          checkOutTime,
          siteLocationId,
          siteName,
          partnerName,
          workTypeId,
          workTypeName,
          createdAt,
          updatedAt,
        ]

    FieldSite:
      type: object
      description: |
        Vendor-approved site row returned by `GET /field/sites`. One
        row per `site_locations` row that has at least one
        `site_work_assignments` row for the calling employee's vendor.
      properties:
        id: { type: integer }
        name: { type: string }
        address: { type: ["string", "null"] }
        state: { type: ["string", "null"] }
        siteCode: { type: ["string", "null"] }
        partnerId: { type: ["integer", "null"] }
        partnerName: { type: ["string", "null"] }
      required: [id, name]

    FieldSiteWorkType:
      type: object
      description: |
        Work-type row returned by
        `GET /field/sites/{siteId}/work-types` for the new-ticket
        flow's work-type picker.
      properties:
        id: { type: integer }
        name: { type: string }
        category: { type: string }
      required: [id, name, category]

    FieldOpenTicketRow:
      type: object
      description: |
        Denormalized "open ticket" row used by the mobile home screen,
        returned by both the list (`GET /field/open-tickets`) and the
        surgical per-id refresh (`GET /field/open-tickets/{id}`). The
        two endpoints are guaranteed to share this shape so a row
        produced by one can replace a row produced by the other in
        local state.
      properties:
        id: { type: integer }
        status:
          type: string
          enum: [initiated, draft, in_progress, kicked_back, pending_review]
        checkInTime: { type: ["string", "null"], format: date-time }
        siteLocationId: { type: ["integer", "null"] }
        siteName: { type: ["string", "null"] }
        partnerName: { type: ["string", "null"] }
        workTypeId: { type: ["integer", "null"] }
        workTypeName: { type: ["string", "null"] }
        fieldEmployeeId: { type: ["integer", "null"] }
        fieldEmployeeFirstName: { type: ["string", "null"] }
        fieldEmployeeLastName: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        updatedAt:
          type: ["string", "null"]
          format: date-time
          description: |
            Last write to the underlying ticket row. Drives the mobile
            open-tickets pill's 7-day inactivity escalation (see
            artifacts/vndrly-mobile/lib/ticketStatusLabels.ts), mirroring
            the web TicketStatusBadge behavior.
        unreadCommentCount:
          type: integer
          minimum: 0
          description: |
            Task #51 — count of comments on this ticket's thread that
            the signed-in field viewer has not yet seen, used to render
            an unread badge on the mobile home-screen ticket card.
            Excludes deleted comments and the viewer's own posts.
            Drops to 0 the next time the list re-fetches after the
            detail screen runs `markAllSeen` on its comments thread.
      required:
        [
          id,
          status,
          checkInTime,
          siteLocationId,
          siteName,
          partnerName,
          workTypeId,
          workTypeName,
          fieldEmployeeId,
          fieldEmployeeFirstName,
          fieldEmployeeLastName,
          createdAt,
          updatedAt,
          unreadCommentCount,
        ]

    CreateFieldTicketBody:
      type: object
      description: |
        Request body for `POST /field/tickets`. `latitude`/`longitude`
        are the device's current GPS fix and are used both for the
        geofence check and (when the check-in succeeds) for the
        initial `gps_logs` `check_in` event. `adjacent` flags an
        implicit check-in for a second ticket on the same site the
        employee is already on (Task #498) — those bypass the
        geofence requirement.
      properties:
        siteLocationId: { type: integer }
        workTypeId: { type: integer }
        latitude: { type: ["number", "null"] }
        longitude: { type: ["number", "null"] }
        description: { type: ["string", "null"] }
        initialState:
          type: ["string", "null"]
          enum: [pending_arrival, on_site, null]
          description: |
            Hint from client: `on_site` (default) attempts an immediate
            check-in subject to the geofence; `pending_arrival` skips
            the check-in regardless of GPS.
        adjacent:
          type: ["boolean", "null"]
          description: |
            When true, treat this as an adjacent ticket alongside an
            existing on-site ticket on the same site — auto-check-in
            unconditionally (Task #498).
            Note: the server also tolerates the legacy string value
            `"1"` (treated as `true`) for older form-style callers,
            but typed SDK clients should always send a boolean.
      required: [siteLocationId, workTypeId]

    FieldCreatedTicket:
      type: object
      description: |
        Newly-inserted ticket row returned by `POST /field/tickets`
        (the raw `tickets` table columns from Drizzle `.returning()`).
        `additionalProperties` is true because the column set may
        evolve faster than this schema; the listed properties are the
        ones the mobile client currently keys off of.
      properties:
        id: { type: integer }
        status:
          type: string
          enum: [initiated, in_progress]
        siteLocationId: { type: integer }
        vendorId: { type: ["integer", "null"] }
        workTypeId: { type: integer }
        fieldEmployeeId: { type: ["integer", "null"] }
        intakeChannel:
          type: string
          enum: [vendor_field_self_service]
        lifecycleState:
          type: string
          enum: [pending_arrival, on_site]
        description: { type: ["string", "null"] }
        checkInTime: { type: ["string", "null"], format: date-time }
        checkInLatitude: { type: ["number", "null"] }
        checkInLongitude: { type: ["number", "null"] }
        arrivedAt: { type: ["string", "null"], format: date-time }
        foremanUserId: { type: ["integer", "null"] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, status, siteLocationId, workTypeId, intakeChannel, lifecycleState, createdAt]
      additionalProperties: true

    CreateFieldTicketError:
      type: object
      description: |
        Structured 400 returned by `POST /field/tickets` when the
        requested (site, work-type) is not allowed for this vendor or
        when the site row no longer exists. The mobile new-ticket
        screen branches on the snake_case `error` field to surface
        the validation under the correct picker via
        `artifacts/vndrly-mobile/lib/apiErrors.ts`.

        Per-code meaning:
          * `site_not_found` — `siteLocationId` does not resolve to a
            row. Site picker should be refreshed.
          * `site_vendor_mismatch` — vendor has no `site_work_assignments`
            row at this site at all. Site picker is wrong.
          * `work_type_not_allowed` — vendor IS at the site but not
            for the requested work type. Work-type picker is wrong.
      properties:
        error:
          type: string
          enum: [site_not_found, site_vendor_mismatch, work_type_not_allowed]
        message: { type: string }
      required: [error]

    FieldPushTokenBody:
      type: object
      description: |
        Body for `POST /field/push-token`. `platform` is an opaque
        client-provided string (typically `"ios"` or `"android"`) used
        by the dispatcher to pick the right push payload shape.
      properties:
        token: { type: string }
        platform: { type: ["string", "null"] }
      required: [token]

    FieldDeletePushTokenBody:
      type: object
      description: Body for `DELETE /field/push-token` (sign-out cleanup).
      properties:
        token: { type: string }
      required: [token]

    ScheduledTicketAckStatus:
      type: string
      description: |
        Per-(crew, ticket) acknowledgement status. `pending` is the
        default for a freshly-rostered crew member; `confirmed` and
        `declined` are written by `POST /tickets/{id}/crew/ack` from
        the mobile Schedule tab.
      enum: [pending, confirmed, declined]

    ScheduledTicketCrewMember:
      type: object
      description: |
        One active `ticket_crew` row, denormalized with the matching
        `vendor_people` name. Returned inside `ScheduledTicket.crew`
        so the mobile Schedule tab can render crewmate names and
        per-person ack pills next to the calling user's own row.
      properties:
        employeeId: { type: integer }
        userId: { type: ["integer", "null"] }
        name:
          type: string
          description: |
            `firstName + lastName` (trimmed). Empty string when the
            underlying `vendor_people` row has neither set.
        isMe:
          type: boolean
          description: True when this crew row's `userId` matches the calling session user.
        ackStatus:
          $ref: "#/components/schemas/ScheduledTicketAckStatus"
      required: [employeeId, userId, name, isMe, ackStatus]

    ScheduledTicket:
      type: object
      description: |
        Denormalized "upcoming scheduled ticket" row returned by
        `GET /me/upcoming-schedule` for the mobile Schedule tab.
        Combines the ticket row with site, partner, vendor, work-type,
        foreman, and active crew so the mobile screen can render the
        full card without follow-up fetches.
      properties:
        id: { type: integer }
        scheduledStartAt: { type: ["string", "null"], format: date-time }
        scheduledDurationMinutes: { type: ["integer", "null"] }
        status:
          $ref: "#/components/schemas/TicketStatus"
        updatedAt:
          type: ["string", "null"]
          format: date-time
          description: |
            Last write to the underlying ticket row. Drives the mobile
            schedule pill's 7-day inactivity escalation (see
            artifacts/vndrly-mobile/lib/ticketStatusLabels.ts), mirroring
            the web TicketStatusBadge behavior. Added by Task #605.
        siteName: { type: ["string", "null"] }
        siteAddress: { type: ["string", "null"] }
        siteLatitude: { type: ["number", "null"] }
        siteLongitude: { type: ["number", "null"] }
        partnerName: { type: ["string", "null"] }
        vendorName: { type: ["string", "null"] }
        workTypeName: { type: ["string", "null"] }
        foremanUserId: { type: ["integer", "null"] }
        foremanName:
          type: string
          description: |
            `users.displayName` of the assigned foreman. Empty string
            when the ticket has no foreman or the foreman row has no
            display name set.
        isForeman:
          type: boolean
          description: True when the ticket's foremanUserId matches the calling session user.
        myAckStatus:
          oneOf:
            - $ref: "#/components/schemas/ScheduledTicketAckStatus"
            - type: "null"
          description: |
            The calling user's own `ticket_crew.ackStatus` for this
            ticket, or `null` when the user is the foreman-only (not
            also a crew member) and therefore has no ack row.
        crew:
          type: array
          items:
            $ref: "#/components/schemas/ScheduledTicketCrewMember"
      required:
        [
          id,
          scheduledStartAt,
          scheduledDurationMinutes,
          status,
          updatedAt,
          siteName,
          siteAddress,
          siteLatitude,
          siteLongitude,
          partnerName,
          vendorName,
          workTypeName,
          foremanUserId,
          foremanName,
          isForeman,
          myAckStatus,
          crew,
        ]

    UpcomingScheduleResponse:
      type: object
      description: |
        Envelope returned by `GET /me/upcoming-schedule`. The list is
        always present (empty when the calling user has no upcoming
        scheduled tickets) so the mobile Schedule tab can render the
        empty state without a separate null check.
      properties:
        tickets:
          type: array
          items:
            $ref: "#/components/schemas/ScheduledTicket"
      required: [tickets]

    UpdateOrgMemberRoleBody:
      type: object
      description: |
        Body for `PATCH /orgs/{orgType}/{orgId}/members/{membershipId}`.
        `ap` is partner-only; vendor orgs reject it with
        `members.invalid_role`.
      properties:
        role:
          type: string
          enum: [admin, member, ap]
      required: [role]

    UpdateOrgMemberRoleResponse:
      type: object
      description: |
        Updated membership row returned by
        `PATCH /orgs/{orgType}/{orgId}/members/{membershipId}`.
        `field_employee` never appears here — those memberships are
        rejected with `members.field_only` before this response is
        produced.
      properties:
        membershipId: { type: integer }
        userId: { type: integer }
        role:
          type: string
          enum: [admin, member, ap]
      required: [membershipId, userId, role]

    AddOrgMemberBody:
      type: object
      description: |
        Body for `POST /orgs/{orgType}/{orgId}/members`. `password`
        and `displayName` are only consulted when `email` does not
        match an existing login — they are silently ignored if a
        user already exists, so an org admin can't reset
        credentials for any login they happen to know the email
        of. `role` defaults to `member` when omitted; `ap` is
        partner-only.
      properties:
        email: { type: string }
        role:
          type: string
          enum: [admin, member, ap]
        password: { type: string }
        displayName: { type: string }
      required: [email]

    AddOrgMemberResponse:
      type: object
      description: |
        Result of `POST /orgs/{orgType}/{orgId}/members`.
        `createdUser` distinguishes a brand-new login (returned
        with HTTP 201) from an existing login that was just
        attached / had its membership role updated (HTTP 200).
        `field_employee` never appears here — those memberships are
        rejected with `members.is_field_employee` before this
        response is produced.
      properties:
        membershipId: { type: integer }
        userId: { type: integer }
        username: { type: string }
        role:
          type: string
          enum: [admin, member, ap]
        createdUser: { type: boolean }
      required: [membershipId, userId, username, role, createdUser]

    OrgMemberRow:
      type: object
      description: |
        Single row in the listing returned by
        `GET /orgs/{orgType}/{orgId}/members`. `role` includes
        `field_employee` because the listing surfaces field-employee
        memberships read-only — they exist on the org but are
        managed via the field-employee tools (the add / remove /
        patch endpoints reject `field_employee` rows). `legacyRole`
        is the `users.role` column kept for back-compat with older
        session-derived role checks (e.g. `admin`, `partner`,
        `vendor`, `field_employee`); the canonical per-org role is
        `role`.

        For vendor orgs the row is LEFT JOIN'd against
        `vendor_people` on `user_id` (and `vendor_id = orgId`) so
        admins / members who also happen to be a field-employee
        record on the same vendor surface their `phone` and
        `pec_expiration_date` here. Both fields are nullable and
        always null for partner-org members (partners have no
        field-employee records).
      properties:
        membershipId: { type: integer }
        userId: { type: integer }
        username: { type: string }
        displayName: { type: string }
        role:
          type: string
          enum: [admin, member, ap, field_employee]
        legacyRole: { type: string }
        jobTitle:
          type: string
          nullable: true
          description: |
            Free-text job title from the matching `vendor_people`
            row, or null when the member has no field-employee
            record on this vendor (or the org is a partner).
        photoUrl:
          type: string
          nullable: true
          description: |
            Profile photo URL from the matching `vendor_people`
            row, or null when the member has no field-employee
            record on this vendor (or the org is a partner).
        phone:
          type: string
          nullable: true
          description: |
            E.164-ish phone string from the matching `vendor_people`
            row, or null when the member has no field-employee
            record on this vendor (or the org is a partner).
        pecExpirationDate:
          type: string
          format: date
          nullable: true
          description: |
            ISO date (YYYY-MM-DD) of the matching `vendor_people`
            PEC expiration, or null when the member has no field-
            employee record on this vendor (or the org is a partner,
            or the field-employee row has no PEC certification).
      required: [membershipId, userId, username, displayName, role, legacyRole]

    ListOrgMembersResponse:
      type: object
      description: |
        Result of `GET /orgs/{orgType}/{orgId}/members`. `orgType`
        and `orgId` echo the path params back so the client can
        sanity-check the response matches the request it sent.
        `members` is ordered by membership id (insertion order).
      properties:
        orgType:
          type: string
          enum: [partner, vendor]
        orgId: { type: integer }
        members:
          type: array
          items:
            $ref: "#/components/schemas/OrgMemberRow"
      required: [orgType, orgId, members]

    OrgMemberErrorResponse:
      type: object
      description: |
        Structured error body returned by the org-members admin
        endpoints. The `code` namespace (`members.*`) is stable and
        safe to branch on in the client; the `message` is a
        human-readable English fallback.
      properties:
        message: { type: string }
        code:
          type: string
          enum:
            - members.invalid_org
            - members.invalid_params
            - members.invalid_role
            - members.missing_email
            - members.weak_password
            - members.is_field_employee
            - members.org_not_found
            - members.field_only
            - members.cant_demote_self
            - members.cant_remove_self
            - members.not_found
            - members.add_failed
      required: [message, code]
