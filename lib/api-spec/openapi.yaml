          type: ["integer", "null"]
        createdByName:
          type: ["string", "null"]
        closedById:
          type: ["integer", "null"]
        closedByName:
          type: ["string", "null"]
        lifecycleState:
          type: ["string", "null"]
          enum: [pending_arrival, en_route, on_location, on_site, off_site, null]
        enRouteAt:
          type: ["string", "null"]
          format: date-time
        arrivedAt:
          type: ["string", "null"]
          format: date-time
        departureLatitude:
          type: ["number", "null"]
        departureLongitude:
          type: ["number", "null"]
        siteLatitude:
          type: ["number", "null"]
        siteLongitude:
          type: ["number", "null"]
        siteRadiusMeters:
          type: ["integer", "null"]
        afe:
          type: ["string", "null"]
        scheduledStartAt:
          type: ["string", "null"]
          format: date-time
        scheduledDurationMinutes:
          type: ["integer", "null"]
        foremanUserId:
          type: ["integer", "null"]
        intakeChannel:
          type: ["string", "null"]
          enum: [partner_self_service, office_on_behalf_of_partner, office_on_behalf_of_field_employee, vendor_field_self_service, null]
          description: "How this ticket was opened. Drives the Source badge in the ticket list (globe / phone / boots)."
        approvedAt:
          description: |
            Task #865 — timestamp the ticket was approved by a partner /
            admin. Set the moment status flips to `approved`. Powers the
            "Approved on" / "Days waiting" columns the partner AP queue
            renders when filtering by `awaitingPayment=true`. Stays
            populated after dispersal so the ticket history is preserved.
          type: ["string", "null"]
          format: date-time
        paymentMethod:
          type: ["string", "null"]
          enum: [etf, ach, check, other, null]
        paymentReference:
          type: ["string", "null"]
        paymentNote:
          type: ["string", "null"]
        paymentDispersedAt:
          type: ["string", "null"]
          format: date-time
        paymentDispersedById:
          type: ["integer", "null"]
        paymentDispersedByName:
          type: ["string", "null"]
        paymentReceiptUrl:
          description: |
            Optional proof-of-payment image attached at dispersal time
            (Task #852). Stored as an object-storage path/URL returned by
            the upload helper; renders inline in the read-only Payment
            Details panel on both web and mobile.
          type: ["string", "null"]
        startingMileage:
          description: |
            Odometer reading captured at En Route. Stored as a numeric
            string with one decimal so the UI can render it verbatim
            without float drift. Null until the field employee submits
            the value on the En Route modal.
          type: ["string", "null"]
        endingMileage:
          description: |
            Odometer reading captured at Check Out. Same numeric-string
            shape as `startingMileage`. Null until the Check Out modal
            persists the value.
          type: ["string", "null"]
        unreadCommentCount:
          type: integer
          minimum: 0
          description: |
            Task #51 — number of comments on this ticket's thread that
            the signed-in viewer has not yet seen, used to render an
            unread badge on the tickets-list page. Excludes
            soft-deleted comments and the viewer's own messages.
            Always 0 when the request has no signed-in viewer (e.g.
            anonymous portal access).
        viewerCanDisperseFunds:
          description: |
            Set on the single-ticket GET response only. True when the
            authenticated viewer is allowed to call POST /tickets/:id/disperse-funds
            for this ticket (admin OR partner contact in the Accounts Payable role
            on the owning partner). List responses omit this field.
          type: ["boolean", "null"]
        viewerCanReverseDispersal:
          description: |
            Set on the single-ticket GET response only. True when the
            authenticated viewer is allowed to call
            POST /tickets/:id/reverse-dispersal for this ticket — i.e.
            the same admin / partner-AP gate as `viewerCanDisperseFunds`
            AND the ticket is currently in `funds_dispersed`. List
            responses omit this field.
          type: ["boolean", "null"]
        phoneIntakeCallerName:
          description: |
            Set on the single-ticket GET response only. The human caller's
            name captured by office phone intake on the ticket's initial
            status transition (extracted from
            `ticket_status_history.reason` formatted as
            `phone_intake_caller:<name>`). Null for tickets that weren't
            opened via phone intake. List responses omit this field.
          type: ["string", "null"]
      required: [id, siteLocationId, vendorId, fieldEmployeeId, workTypeId, status, description, notes, kickbackReason, checkInTime, checkOutTime, checkInLatitude, checkInLongitude, checkOutLatitude, checkOutLongitude, siteName, vendorName, workTypeName, fieldEmployeeName, partnerName, partnerLogoUrl, vendorLogoUrl, createdAt, updatedAt, unlockedAt, unlockedById, unlockedByName, unlockCount, createdById, createdByName, closedById, closedByName, lifecycleState, enRouteAt, arrivedAt, departureLatitude, departureLongitude, siteLatitude, siteLongitude, siteRadiusMeters, afe, scheduledStartAt, scheduledDurationMinutes, foremanUserId, intakeChannel, paymentMethod, paymentReference, paymentNote, paymentDispersedAt, paymentDispersedById, paymentDispersedByName, paymentReceiptUrl, unreadCommentCount]

    CreateTicketBody:
      type: object
      properties:
        siteLocationId:
          type: integer
        vendorId:
          type: integer
        fieldEmployeeId:
          type: ["integer", "null"]
        workTypeId:
          type: integer
        description:
          type: ["string", "null"]
        checkInLatitude:
          type: ["number", "null"]
        checkInLongitude:
          type: ["number", "null"]
        initialState:
          type: ["string", "null"]
          enum: [pending_arrival, on_site, null]
          description: "Hint from client: 'on_site' = check in immediately; 'pending_arrival' = create without check-in. Server still verifies geofence."
        intakeChannel:
          type: ["string", "null"]
          enum: [partner_self_service, office_on_behalf_of_partner, office_on_behalf_of_field_employee, vendor_field_self_service, null]
          description: "Optional explicit intake channel. Server validates the caller is allowed to claim it; unauthorized values fall back to the role-default channel."
        acceptanceImplicit:
          type: ["boolean", "null"]
          description: "Office phone-intake only. When true on office_on_behalf_of_partner, skip the vendor-accept gate and start at initiated/in_progress (the partner has already coordinated)."
        phoneIntakeCallerName:
          type: ["string", "null"]
          description: "Office phone-intake only. Free-text caller name persisted to ticket_status_history.reason as `phone_intake_caller:<name>`."
        foremanUserId:
          type: ["integer", "null"]
          description: "Optional foreman assignment. Office_on_behalf_of_field_employee uses this to mark the named FE as foreman."
        scheduledStartAt:
          type: ["string", "null"]
          format: date-time
        scheduledDurationMinutes:
          type: ["integer", "null"]
      required: [siteLocationId, vendorId, workTypeId]

    DisperseFundsBody:
      type: object
      properties:
        paymentMethod:
          type: string
          enum: [etf, ach, check, other]
        paymentReference:
          type: ["string", "null"]
          description: "Required for paymentMethod=check (check no.); optional for etf/ach/other."
        note:
          type: ["string", "null"]
          description: Free-text note recorded on the status_history entry.
        paymentReceiptUrl:
          type: ["string", "null"]
          description: |
            Optional proof-of-payment image (Task #852). Object-storage
            path/URL returned by the upload helper — typically a check
            stub, wire confirmation, or signed receipt snapped from the
            mobile Disperse Funds modal. Persisted alongside the other
            payment columns and surfaced read-only on the Payment Details
            panel.
      required: [paymentMethod]

