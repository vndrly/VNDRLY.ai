# vndrly.ai — nginx site config (HTTP + HTTPS).
# Installed to /etc/nginx/sites-available/vndrly.ai by deploy/bootstrap.
# client_max_body_size must match api-server express.raw limit (25mb).

server {
    listen 80;
    listen [::]:80;
    server_name vndrly.ai www.vndrly.ai;

    client_max_body_size 25m;

    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 25m;
    }

    location / {
        root /var/www/vndrly/artifacts/vndrly/dist/public;
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name vndrly.ai www.vndrly.ai;

    client_max_body_size 25m;

    ssl_certificate /etc/letsencrypt/live/vndrly.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vndrly.ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 25m;
    }

    location / {
        root /var/www/vndrly/artifacts/vndrly/dist/public;
        try_files $uri $uri/ /index.html;
    }
}
